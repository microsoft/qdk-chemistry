parameters:
- name: march
  type: string
  default: x86-64-v3
- name: buildType
  type: string
  default: Release
- name: agentBuildDirectory
  type: string
  default: $(Agent.BuildDirectory)
- name: pythonVersion
  type: string
  default: '3.12'
- name: vcpkgTriplet
  type: string
  default: x64-windows
- name: devTag
  type: string
  default: 'None'

steps:
- checkout: self
  persistCredentials: true
  path: qdk-chemistry
  fetchDepth: 1
  retryCountOnTaskFailure: 3

- task: PipAuthenticate@1
  displayName: Pip Authenticate
  inputs:
    artifactFeeds: ""

- task: UsePythonVersion@0
  displayName: Use Python ${{ parameters.pythonVersion }}
  inputs:
    versionSpec: ${{ parameters.pythonVersion }}

# Check if user provided a development tag for release and validate before building wheels.
- powershell: |
    python ${{ parameters.agentBuildDirectory }}/qdk-chemistry/.pipelines/pip-scripts/versioning.py `
      --version-file ${{ parameters.agentBuildDirectory }}/qdk-chemistry/VERSION `
      --dev-tag ${{ parameters.devTag }}
    Get-Content ${{ parameters.agentBuildDirectory }}/qdk-chemistry/VERSION
  displayName: Validate/Set Development Version for Wheels
  condition: ne('${{ parameters.devTag }}', 'None')

# Install Visual Studio Clang tools if not present
- powershell: |
    $ErrorActionPreference = "Stop"

    # Check if clang-cl is already available
    $clangCl = Get-Command clang-cl -ErrorAction SilentlyContinue
    if ($clangCl) {
        Write-Host "clang-cl found at: $($clangCl.Source)"
        & clang-cl --version
        exit 0
    }

    # Search in Visual Studio installation directories
    $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
    if (Test-Path $vsWhere) {
        $vsPath = & $vsWhere -latest -products * -property installationPath
        $clangClPath = Join-Path $vsPath "VC\Tools\Llvm\x64\bin\clang-cl.exe"
        if (Test-Path $clangClPath) {
            Write-Host "clang-cl found at: $clangClPath"
            & $clangClPath --version
            exit 0
        }
    }

    # Not found - install via Visual Studio Installer
    Write-Host "clang-cl not found. Installing C++ Clang tools for Windows..."
    $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
    if (-not (Test-Path $vsInstaller)) {
        Write-Error "Visual Studio Installer not found. Cannot install Clang tools."
        exit 1
    }

    # Find the installed VS instance
    $vsPath = & $vsWhere -latest -products * -property installationPath
    if (-not $vsPath) {
        Write-Error "No Visual Studio installation found."
        exit 1
    }

    Write-Host "Installing Clang tools into: $vsPath"
    $process = Start-Process -FilePath $vsInstaller -ArgumentList `
        "modify", "--installPath", "`"$vsPath`"", `
        "--add", "Microsoft.VisualStudio.Component.VC.Llvm.Clang", `
        "--add", "Microsoft.VisualStudio.Component.VC.Llvm.ClangToolset", `
        "--quiet", "--norestart", "--wait" `
        -Wait -PassThru -NoNewWindow

    if ($process.ExitCode -ne 0) {
        Write-Error "Failed to install Clang tools. Exit code: $($process.ExitCode)"
        exit 1
    }

    # Verify installation
    $clangClPath = Join-Path $vsPath "VC\Tools\Llvm\x64\bin\clang-cl.exe"
    if (Test-Path $clangClPath) {
        Write-Host "clang-cl installed successfully at: $clangClPath"
        & $clangClPath --version
    } else {
        Write-Error "clang-cl still not found after installation attempt."
        exit 1
    }
  displayName: Install/verify clang-cl

# Build the wheel using PowerShell script
- powershell: |
    cd ${{ parameters.agentBuildDirectory }}/qdk-chemistry
    .\.pipelines\pip-scripts\build-pip-wheels-windows.ps1 `
      -March ${{ parameters.march }} `
      -PythonVersion ${{ parameters.pythonVersion }} `
      -BuildType ${{ parameters.buildType }} `
      -VcpkgTriplet ${{ parameters.vcpkgTriplet }} `
      -DevTag ${{ parameters.devTag }}
  displayName: Build wheel (Windows)
  retryCountOnTaskFailure: 2
  env:
    VCPKG_BINARY_SOURCES: "clear;nuget,$(VCPKG_NUGET_SOURCE),readwrite"

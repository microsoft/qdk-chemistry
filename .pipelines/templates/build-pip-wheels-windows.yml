parameters:
- name: march
  type: string
  default: x86-64-v3
- name: buildType
  type: string
  default: Release
- name: agentBuildDirectory
  type: string
  default: $(Agent.BuildDirectory)
- name: pythonVersion
  type: string
  default: '3.11'
- name: devTag
  type: string
  default: 'None'

steps:
- checkout: self
  persistCredentials: true
  path: qdk-chemistry
  fetchDepth: 1
  retryCountOnTaskFailure: 3

- pwsh: |
    python "$(System.DefaultWorkingDirectory)\.pipelines\pip-scripts\versioning.py" `
      --version-file "$(System.DefaultWorkingDirectory)\VERSION" `
      --dev-tag ${{ parameters.devTag }}
    Get-Content "$(System.DefaultWorkingDirectory)\VERSION"
  displayName: Validate/Set Development Version for Wheels
  condition: ne('${{ parameters.devTag }}', 'None')

# Import the VS x64 developer environment (INCLUDE, LIB, PATH, etc.) so that
# cl.exe and the MSVC linker are available to all subsequent steps.
# Also resolves the MSVC toolset version for the dependency cache key.
- template: steps/setup-msvc-env.yml@self

# Hash all files that influence how the C++ dependencies are built.
# The result is used in the Cache@2 key so the cache is invalidated on any
# dep-affecting change without listing every file individually in the key.
- pwsh: |
    $root = "$(System.DefaultWorkingDirectory)"
    $files = @(
        "$root\vcpkg.json",
        "$root\vcpkg-configuration.json",
        "$root\cpp\manifest\qdk-chemistry\cgmanifest.json",
        "$root\external\macis\manifest\cgmanifest.json",
        "$root\cpp\cmake\third_party.cmake",
        "$root\cpp\cmake\modules\DependencyManager.cmake",
        "$root\external\macis\src\lobpcgxx\CMakeLists.txt",
        "$root\.pipelines\toolchains\windows.cmake"
    )
    if (Test-Path "$root\vcpkg-overlay") {
        $files += Get-ChildItem "$root\vcpkg-overlay" -Recurse -File |
                  Select-Object -ExpandProperty FullName
    }
    if (Test-Path "$root\cpp\cmake\patches") {
        $files += Get-ChildItem "$root\cpp\cmake\patches" -Recurse -File |
                  Select-Object -ExpandProperty FullName
    }
    $hashes = $files | Where-Object { Test-Path $_ } | Sort-Object |
              ForEach-Object { (Get-FileHash $_ -Algorithm SHA256).Hash }
    $combined  = $hashes -join ","
    $hashBytes = [System.Security.Cryptography.SHA256]::Create().ComputeHash(
                     [System.Text.Encoding]::UTF8.GetBytes($combined))
    $hashStr   = ($hashBytes | ForEach-Object { $_.ToString("x2") }) -join ""
    Write-Host "Dependency files hash: $hashStr"
    Write-Host "##vso[task.setvariable variable=DEPS_FILES_HASH]$hashStr"
  displayName: Compute dependency cache key

# Restore the dependency build dirs separately to avoid a known Windows issue
# with Cache@2 multi-line `path`: the task passes both lines as a single tar
# argument, causing "could not chdir" at save time. Two tasks work reliably.
- task: Cache@2
  displayName: Restore / save vcpkg dependency cache
  inputs:
    key: '"windows-vcpkg-x64-windows-static-md-v1" | "$(MSVC_TOOLSET)" | "$(DEPS_FILES_HASH)"'
    path: $(System.DefaultWorkingDirectory)/vcpkg_installed
    cacheHitVar: VCPKG_CACHE_RESTORED

- task: Cache@2
  displayName: Restore / save C++ build cache
  inputs:
    key: '"windows-deps-msvc-x64-windows-static-md-v1" | "$(MSVC_TOOLSET)" | "$(DEPS_FILES_HASH)"'
    path: $(System.DefaultWorkingDirectory)/cpp/build-msvc
    cacheHitVar: DEPS_CACHE_RESTORED

# Full qdk build, C++ tests, conda environment setup, and Python wheel build.
# SYSTEM_ACCESSTOKEN is required by bootstrap-conda for the Azure Artifacts feed.
- pwsh: |
    & "$(System.DefaultWorkingDirectory)\.pipelines\pip-scripts\build-pip-wheels-windows.ps1" `
        -SrcDir        "$(System.DefaultWorkingDirectory)" `
        -March         "${{ parameters.march }}" `
        -BuildType     "${{ parameters.buildType }}" `
        -ClPath        "$(CL_PATH)" `
        -PythonVersion "${{ parameters.pythonVersion }}" `
        -DevTag        "${{ parameters.devTag }}"
  displayName: Build C++ library, run tests, and build Python wheel
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    OMP_NUM_THREADS: '2'

- task: PublishTestResults@2
  displayName: Publish C++ test results
  inputs:
    testResultsFormat: JUnit
    testResultsFiles: '$(System.DefaultWorkingDirectory)/cpp/build-msvc/ctest_results.xml'
    testRunTitle: 'C++ tests - Windows x86_64 Python ${{ parameters.pythonVersion }}'
  condition: always()

parameters:
- name: march
  type: string
  default: armv8-a
- name: buildType
  type: string
  default: Release
- name: buildTesting
  type: string
  default: ON
- name: enableCoverage
  type: string
  default: OFF
- name: agentBuildDirectory
  type: string
  default: $(Agent.BuildDirectory)
- name: pythonVersion
  type: string
  default: 3.11
- name: cmakeVersion
  type: string
  default: 3.28.3
- name: hdf5Version
  type: string
  default: 1.13.0
- name: blisVersion
  type: string
  default: 2.0
- name: libflameVersion
  type: string
  default: 5.2.0
- name: macBuild
  type: string
  default: OFF
- name: devTag
  type: string
  default: 'None'
- name: containerName
  type: string
  default: 'linux_build_container'

steps:
- checkout: self
  persistCredentials: true
  path: qdk-chemistry
  fetchDepth: 1
  retryCountOnTaskFailure: 3
  target: ${{ parameters.containerName }}

- script: |
    # show folder contents for debugging
    pwd
    ls -la
    ls -la ..
    ls -laR ..
  target: ${{ parameters.containerName }}
  displayName: List directory contents in build container

# Check if user provided a development tag for release and validate before building wheels.
# If a development tag is provided and is valid, the VERSION file in the top level directory
# will be updated to include the dev tag before publishing to PyPI.
- script: |
    set -e
    python3 $(Agent.BuildDirectory)/qdk-chemistry/.pipelines/pip-scripts/versioning.py \
    --version-file $(Agent.BuildDirectory)/qdk-chemistry/VERSION \
    --dev-tag ${{ parameters.devTag }}
    cat $(Agent.BuildDirectory)/qdk-chemistry/VERSION
  displayName: Validate/Set Development Version for Wheels
  condition: ne('${{ parameters.devTag }}', 'None')

# CodeQL Init - x86_64 Linux only. Init, build, and Finalize must all run in the
# same environment for C++ tracing to work; using target: keeps them in the container.
- ${{ if eq(parameters.macBuild, 'OFF') }}:
  - ${{ if ne(parameters.march, 'armv8-a') }}:
    - task: CodeQL3000Init@0
      target: ${{ parameters.containerName }}
      displayName: 🛡🛡 CodeQL Initialize
      inputs:
        languages: cpp,python
        sourceRoot: $(Agent.BuildDirectory)/qdk-chemistry

  - script: |
      echo "Running pip wheel build (Linux ${{ parameters.march }})..."
      cd ${{ parameters.agentBuildDirectory }}/qdk-chemistry
      bash .pipelines/pip-scripts/build-pip-wheels.sh ${{ parameters.march }} \
                                                      ${{ parameters.pythonVersion }} \
                                                      ${{ parameters.buildType }} \
                                                      ${{ parameters.buildTesting }} \
                                                      ${{ parameters.enableCoverage }} \
                                                      ${{ parameters.cmakeVersion }} \
                                                      ${{ parameters.hdf5Version }} \
                                                      ${{ parameters.blisVersion }} \
                                                      ${{ parameters.libflameVersion }} \
                                                      ${{ parameters.macBuild }}
    displayName: Build wheel (Linux ${{ parameters.march }})
    retryCountOnTaskFailure: 2
    target: ${{ parameters.containerName }}
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  - ${{ if ne(parameters.march, 'armv8-a') }}:
    # CodeQL Finalize - x86_64 Linux only (condition: always() so it runs even on build failure)
    # - ${{ if eq(target.arch, 'x86_64') }}:
    - task: CodeQL3000Finalize@0
      target: ${{ parameters.containerName }}
      condition: always()
      displayName: 🛡🛡 CodeQL Finalize

- ${{ if eq(parameters.macBuild, 'ON') }}:
  - script: |
      set -x
      echo "Running pip wheel build (native)..."
      cd ${{ parameters.agentBuildDirectory }}/qdk-chemistry
      bash .pipelines/pip-scripts/build-pip-wheels.sh ${{ parameters.march }} \
                                                      ${{ parameters.pythonVersion }} \
                                                      ${{ parameters.buildType }} \
                                                      ${{ parameters.buildTesting }} \
                                                      ${{ parameters.enableCoverage }} \
                                                      ${{ parameters.cmakeVersion }} \
                                                      ${{ parameters.hdf5Version }} \
                                                      ${{ parameters.blisVersion }} \
                                                      ${{ parameters.libflameVersion }} \
                                                      ${{ parameters.macBuild }}
    displayName: Build wheel (macOS native)
    retryCountOnTaskFailure: 2
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

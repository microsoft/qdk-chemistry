parameters:
- name: march
  type: string
  default: armv8-a
- name: buildType
  type: string
  default: Release
- name: buildTesting
  type: string
  default: ON
- name: enableCoverage
  type: string
  default: OFF
- name: agentBuildDirectory
  type: string
  default: $(Agent.BuildDirectory)
- name: dockerImage
  type: string
  default: ubuntu:24.04
- name: imageTag
  type: string
  default: linux/amd64
- name: pythonVersion
  type: string
  default: 3.11
- name: cmakeVersion
  type: string
  default: 3.28.3
- name: hdf5Version
  type: string
  default: 1.13.0
- name: blisVersion
  type: string
  default: 2.0
- name: libflameVersion
  type: string
  default: 5.2.0
- name: macBuild
  type: string
  default: OFF
- name: devTag
  type: string
  default: 'None'

steps:
- checkout: self
  persistCredentials: true
  path: qdk-chemistry
  fetchDepth: 1
  retryCountOnTaskFailure: 3

- ${{ if eq(parameters.macBuild, 'OFF') }}:
  - script: |
      echo "=== Disk space before cleanup ==="
      df -h

      # Remove unnecessary large packages commonly present on GitHub runners
      sudo rm -rf /usr/share/dotnet || true
      sudo rm -rf /usr/local/lib/android || true
      sudo rm -rf /opt/ghc || true
      sudo rm -rf /opt/hostedtoolcache/go || true
      sudo rm -rf /opt/hostedtoolcache/Ruby || true

      # Clean apt cache
      sudo apt-get clean || true

      echo "=== Disk space after cleanup ==="
      df -h

      echo "Workspace path: $(Agent.BuildDirectory)"
      echo "Space available:"
      df -h "$(Agent.BuildDirectory)"
    displayName: Free up disk space (Linux)


# Check if user provided a development tag for release and validate before building wheels.
# If a development tag is provided and is valid, the VERSION file in the top level directory
# will be updated to include the dev tag before publishing to PyPI.
- script: |
    set -e
    python3 $(Agent.BuildDirectory)/qdk-chemistry/.pipelines/pip-scripts/versioning.py \
    --version-file $(Agent.BuildDirectory)/qdk-chemistry/VERSION \
    --dev-tag ${{ parameters.devTag }}
    cat $(Agent.BuildDirectory)/qdk-chemistry/VERSION
  displayName: Validate/Set Development Version for Wheels
  condition: ne('${{ parameters.devTag }}', 'None')

- ${{ if and(eq(parameters.macBuild, 'OFF'), eq(parameters.imageTag, 'linux/amd64')) }}:
  - script: |
      echo "Running pip wheel build (Linux ${{ parameters.march }} on ${{ parameters.imageTag }})..."
      docker run --rm \
        --platform ${{ parameters.imageTag }} \
        -v ${{ parameters.agentBuildDirectory }}:/workspace:rshared \
        -e PIP_INDEX_URL \
        -e SYSTEM_ACCESSTOKEN \
        -e QDK_UARCH=${{ parameters.march }} \
        -w /workspace/qdk-chemistry \
        ${{ parameters.dockerImage }} \
      bash .pipelines/pip-scripts/build-pip-wheels.sh ${{ parameters.march }} \
                                                      ${{ parameters.pythonVersion }} \
                                                      ${{ parameters.buildType }} \
                                                      ${{ parameters.buildTesting }} \
                                                      ${{ parameters.enableCoverage }} \
                                                      ${{ parameters.cmakeVersion }} \
                                                      ${{ parameters.hdf5Version }} \
                                                      ${{ parameters.blisVersion }} \
                                                      ${{ parameters.libflameVersion }} \
                                                      ${{ parameters.macBuild }}
    displayName: Build wheel (Linux ${{ parameters.march }})
    retryCountOnTaskFailure: 2
    env:
      # Required by the conda bootstrap to authenticate to the Azure Artifacts
      # feed that proxies ms-ensureconda + conda channels.
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

- ${{ if and(eq(parameters.macBuild, 'OFF'), ne(parameters.imageTag, 'linux/amd64')) }}:
  - script: |
      echo "Running pip wheel build (Linux ${{ parameters.march }} on ${{ parameters.imageTag }})..."
      docker run --rm \
        --platform ${{ parameters.imageTag }} \
        -v ${{ parameters.agentBuildDirectory }}:/workspace:rshared \
        -e PIP_INDEX_URL \
        -e SYSTEM_ACCESSTOKEN \
        -e QDK_UARCH=${{ parameters.march }} \
        -w /workspace/qdk-chemistry \
        ${{ parameters.dockerImage }} \
      bash .pipelines/pip-scripts/build-pip-wheels.sh ${{ parameters.march }} \
                                                      ${{ parameters.pythonVersion }} \
                                                      ${{ parameters.buildType }} \
                                                      ${{ parameters.buildTesting }} \
                                                      ${{ parameters.enableCoverage }} \
                                                      ${{ parameters.cmakeVersion }} \
                                                      ${{ parameters.hdf5Version }} \
                                                      ${{ parameters.blisVersion }} \
                                                      ${{ parameters.libflameVersion }} \
                                                      ${{ parameters.macBuild }}
    displayName: Build wheel (Linux ${{ parameters.march }})
    retryCountOnTaskFailure: 2
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

- ${{ if eq(parameters.macBuild, 'ON') }}:
  - script: |
      set -x
      echo "Running pip wheel build (native)..."
      cd ${{ parameters.agentBuildDirectory }}/qdk-chemistry
      bash .pipelines/pip-scripts/build-pip-wheels.sh ${{ parameters.march }} \
                                                      ${{ parameters.pythonVersion }} \
                                                      ${{ parameters.buildType }} \
                                                      ${{ parameters.buildTesting }} \
                                                      ${{ parameters.enableCoverage }} \
                                                      ${{ parameters.cmakeVersion }} \
                                                      ${{ parameters.hdf5Version }} \
                                                      ${{ parameters.blisVersion }} \
                                                      ${{ parameters.libflameVersion }} \
                                                      ${{ parameters.macBuild }}
    displayName: Build wheel (macOS native)
    retryCountOnTaskFailure: 2
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

parameters:
- name: march
  type: string
  default: armv8-a
- name: buildType
  type: string
  default: Debug
- name: buildTesting
  type: string
  default: ON
- name: enableCoverage
  type: string
  default: OFF
- name: agentBuildDirectory
  type: string
  default: $(Agent.BuildDirectory)
- name: dockerImage
  type: string
  default: ubuntu:22.04
- name: imageTag
  type: string
  default: linux/amd64
- name: pythonVersion
  type: string
  default: 3.11
- name: cmakeVersion
  type: string
  default: 3.28.3
- name: hdf5Version
  type: string
  default: 1.13.0
- name: blisVersion
  type: string
  default: 2.0
- name: libflameVersion
  type: string
  default: 5.2.0
- name: pyenvVersion
  type: string
  default: 2.6.15
- name: macBuild
  type: string
  default: OFF
- name: devTag
  type: string
  default: 'None'

steps:
- checkout: self
  persistCredentials: true
  path: qdk-chemistry
  fetchDepth: 1
  retryCountOnCheckout: 3

- task: PipAuthenticate@1
  displayName: Pip Authenticate
  inputs:
    artifactFeeds: ""

# Check if user provided a development tag for release and validate before building wheels.
# If a development tag is provided and is valid, the VERSION file in the top level directory
# will be updated to include the dev tag before publishing to PyPI.
- script: |
    set -e
    python3 $(Agent.BuildDirectory)/qdk-chemistry/.pipelines/pip-scripts/versioning.py \
    --version-file $(Agent.BuildDirectory)/qdk-chemistry/VERSION \
    --dev-tag ${{ parameters.devTag }}
    cat $(Agent.BuildDirectory)/qdk-chemistry/VERSION
  displayName: Validate/Set Development Version for Wheels
  condition: ne('${{ parameters.devTag }}', 'None')

- ${{ if eq(parameters.macBuild, 'OFF') }}:
  - script: |
      echo "Running pip wheel build (Linux)..."
      docker run --rm \
        --platform ${{ parameters.imageTag }} \
        -v ${{ parameters.agentBuildDirectory }}:/workspace:rshared \
        -e QDK_UARCH=${{ parameters.march }} \
        -w /workspace/qdk-chemistry \
        ${{ parameters.dockerImage }} \
      bash .pipelines/pip-scripts/build-pip-wheels.sh ${{ parameters.march }} \
                                                      ${{ parameters.pythonVersion }} \
                                                      ${{ parameters.buildType }} \
                                                      ${{ parameters.buildTesting }} \
                                                      ${{ parameters.enableCoverage }} \
                                                      ${{ parameters.cmakeVersion }} \
                                                      ${{ parameters.hdf5Version }} \
                                                      ${{ parameters.blisVersion }} \
                                                      ${{ parameters.libflameVersion }} \
                                                      ${{ parameters.pyenvVersion }} \
                                                      ${{ parameters.macBuild }}
    displayName: Build wheel (Linux)
    retryCountOnTaskFailure: 4

- ${{ if eq(parameters.macBuild, 'ON') }}:
  - script: |
      echo "Running pip wheel build (native)..."
      cd ${{ parameters.agentBuildDirectory }}/qdk-chemistry
      bash .pipelines/pip-scripts/build-pip-wheels.sh ${{ parameters.march }} \
                                                      ${{ parameters.pythonVersion }} \
                                                      ${{ parameters.buildType }} \
                                                      ${{ parameters.buildTesting }} \
                                                      ${{ parameters.enableCoverage }} \
                                                      ${{ parameters.cmakeVersion }} \
                                                      ${{ parameters.hdf5Version }} \
                                                      ${{ parameters.blisVersion }} \
                                                      ${{ parameters.libflameVersion }} \
                                                      ${{ parameters.pyenvVersion }} \
                                                      ${{ parameters.macBuild }}
    displayName: Build wheel (macOS native)
    retryCountOnTaskFailure: 4

parameters:
- name: march
  type: string
  default: armv8-a
- name: buildType
  type: string
  default: Release
- name: buildTesting
  type: string
  default: ON
- name: enableCoverage
  type: string
  default: OFF
- name: agentBuildDirectory
  type: string
  default: $(Agent.BuildDirectory)
- name: pythonVersion
  type: string
  default: 3.11
- name: cmakeVersion
  type: string
  default: 3.28.3
- name: hdf5Version
  type: string
  default: 1.13.0
- name: blisVersion
  type: string
  default: 2.0
- name: libflameVersion
  type: string
  default: 5.2.0
- name: macBuild
  type: string
  default: OFF
- name: devTag
  type: string
  default: 'None'

steps:
- checkout: self
  persistCredentials: true
  path: qdk-chemistry
  fetchDepth: 1
  retryCountOnTaskFailure: 3

# Sanity check: verify we're running inside the Ubuntu container as root,
# not on the host AzureLinux pool. If this fails the 1ES container job
# didn't actually containerize the steps.
- ${{ if eq(parameters.macBuild, 'OFF') }}:
  - script: |
      set -e
      echo "whoami: $(whoami) (uid=$(id -u))"
      echo "--- /etc/os-release ---"
      cat /etc/os-release
      . /etc/os-release
      if [ "$ID" != "ubuntu" ]; then
        echo "ERROR: expected to run inside Ubuntu container, got ID=$ID" >&2
        exit 1
      fi
      if [ "$(id -u)" != "0" ]; then
        echo "ERROR: expected to run as root inside the container" >&2
        exit 1
      fi
    displayName: Verify Ubuntu container environment

# Check if user provided a development tag for release and validate before building wheels.
# If a development tag is provided and is valid, the VERSION file in the top level directory
# will be updated to include the dev tag before publishing to PyPI.
- script: |
    set -e
    python3 $(Agent.BuildDirectory)/qdk-chemistry/.pipelines/pip-scripts/versioning.py \
    --version-file $(Agent.BuildDirectory)/qdk-chemistry/VERSION \
    --dev-tag ${{ parameters.devTag }}
    cat $(Agent.BuildDirectory)/qdk-chemistry/VERSION
  displayName: Validate/Set Development Version for Wheels
  condition: ne('${{ parameters.devTag }}', 'None')

- ${{ if eq(parameters.macBuild, 'OFF') }}:
  # Linux build runs inside a 1ES container job. The step executes inside the
  # container the job declared, which keeps CodeQL Init, the compile, and CodeQL
  # Finalize in the same environment.
  - script: |
      echo "Running pip wheel build (Linux ${{ parameters.march }}, container job)..."
      cd ${{ parameters.agentBuildDirectory }}/qdk-chemistry
      bash .pipelines/pip-scripts/build-pip-wheels.sh ${{ parameters.march }} \
                                                      ${{ parameters.pythonVersion }} \
                                                      ${{ parameters.buildType }} \
                                                      ${{ parameters.buildTesting }} \
                                                      ${{ parameters.enableCoverage }} \
                                                      ${{ parameters.cmakeVersion }} \
                                                      ${{ parameters.hdf5Version }} \
                                                      ${{ parameters.blisVersion }} \
                                                      ${{ parameters.libflameVersion }} \
                                                      ${{ parameters.macBuild }}
    displayName: Build wheel (Linux ${{ parameters.march }})
    retryCountOnTaskFailure: 1
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

- ${{ if eq(parameters.macBuild, 'ON') }}:
  - script: |
      set -x
      echo "Running pip wheel build (native)..."
      cd ${{ parameters.agentBuildDirectory }}/qdk-chemistry
      bash .pipelines/pip-scripts/build-pip-wheels.sh ${{ parameters.march }} \
                                                      ${{ parameters.pythonVersion }} \
                                                      ${{ parameters.buildType }} \
                                                      ${{ parameters.buildTesting }} \
                                                      ${{ parameters.enableCoverage }} \
                                                      ${{ parameters.cmakeVersion }} \
                                                      ${{ parameters.hdf5Version }} \
                                                      ${{ parameters.blisVersion }} \
                                                      ${{ parameters.libflameVersion }} \
                                                      ${{ parameters.macBuild }}
    displayName: Build wheel (macOS native)
    retryCountOnTaskFailure: 2
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

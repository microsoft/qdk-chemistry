parameters:
- name: march
  type: string
  default: x86-64-v3
- name: buildType
  type: string
  default: Release

steps:
- checkout: self
  persistCredentials: true
  path: qdk-chemistry
  fetchDepth: 1
  retryCountOnTaskFailure: 3

# Import the VS x64 developer environment (INCLUDE, LIB, PATH, etc.) so that
# cl.exe and the MSVC linker are available to all subsequent steps.
# Also resolves the MSVC toolset version for the dependency cache key.
- pwsh: |
    $ErrorActionPreference = 'Stop'

    $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
    $vsPath = & $vswhere -latest -products * -property installationPath
    if (-not $vsPath) { throw "No Visual Studio installation found" }
    Write-Host "Visual Studio: $vsPath"

    $vcvarsall = "$vsPath\VC\Auxiliary\Build\vcvarsall.bat"
    if (-not (Test-Path $vcvarsall)) { throw "vcvarsall.bat not found at $vcvarsall" }

    $before = @{}
    Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }
    $tmp = [System.IO.Path]::GetTempFileName()
    cmd /c "`"$vcvarsall`" x64 && set > `"$tmp`""
    if ($LASTEXITCODE -ne 0) { throw "vcvarsall.bat failed ($LASTEXITCODE)" }
    $after = @{}
    Get-Content $tmp | ForEach-Object {
        if ($_ -match '^([^=]+)=(.*)$') { $after[$matches[1]] = $matches[2] }
    }
    Remove-Item $tmp

    foreach ($name in $after.Keys) {
        [System.Environment]::SetEnvironmentVariable($name, $after[$name], 'Process')
    }

    $clCmd = Get-Command cl.exe -ErrorAction SilentlyContinue
    $cl = if ($clCmd) { $clCmd.Source } else { $null }
    if (-not $cl) { throw "cl.exe not found on PATH after vcvarsall x64" }
    Write-Host "cl.exe: $cl"
    & $cl 2>&1 | Select-Object -First 2 | Write-Host

    foreach ($name in $after.Keys) {
        if ($name -ieq 'Path') { continue }
        if ($before[$name] -ne $after[$name]) {
            Write-Host "##vso[task.setvariable variable=$name]$($after[$name])"
        }
    }
    $beforePath = @($before['Path'] -split ';')
    $newEntries = @($after['Path'] -split ';') | Where-Object { $_ -and ($beforePath -notcontains $_) }
    $newEntries | ForEach-Object { Write-Host "##vso[task.prependpath]$_" }

    $toolsetFile = "$vsPath\VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt"
    $toolset = (Get-Content $toolsetFile -ErrorAction Stop | Select-Object -First 1).Trim()
    Write-Host "MSVC toolset: $toolset"
    Write-Host "##vso[task.setvariable variable=MSVC_TOOLSET]$toolset"
    Write-Host "##vso[task.setvariable variable=CL_PATH]$cl"

    $vcpkgRoot = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { 'C:\vcpkg' }
    if (Test-Path "$vcpkgRoot\vcpkg.exe") {
        Write-Host "vcpkg already available at $vcpkgRoot"
    } else {
        Write-Host "vcpkg not found — bootstrapping into $vcpkgRoot"
        git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot --depth 1
        & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
        if ($LASTEXITCODE -ne 0) { throw "vcpkg bootstrap failed ($LASTEXITCODE)" }
        Write-Host "##vso[task.setvariable variable=VCPKG_INSTALLATION_ROOT]$vcpkgRoot"
    }
    Write-Host "##vso[task.setvariable variable=VCPKG_ROOT]$vcpkgRoot"
  displayName: Set up MSVC environment

# Hash all files that influence how the C++ dependencies are built.
- pwsh: |
    $root = "$(System.DefaultWorkingDirectory)"
    $files = @(
        "$root\vcpkg.json",
        "$root\vcpkg-configuration.json",
        "$root\cpp\manifest\qdk-chemistry\cgmanifest.json",
        "$root\external\macis\manifest\cgmanifest.json",
        "$root\cpp\cmake\third_party.cmake",
        "$root\cpp\cmake\modules\DependencyManager.cmake",
        "$root\external\macis\src\lobpcgxx\CMakeLists.txt",
        "$root\.pipelines\toolchains\windows.cmake"
    )
    if (Test-Path "$root\vcpkg-overlay") {
        $files += Get-ChildItem "$root\vcpkg-overlay" -Recurse -File |
                  Select-Object -ExpandProperty FullName
    }
    if (Test-Path "$root\cpp\cmake\patches") {
        $files += Get-ChildItem "$root\cpp\cmake\patches" -Recurse -File |
                  Select-Object -ExpandProperty FullName
    }
    $hashes = $files | Where-Object { Test-Path $_ } | Sort-Object |
              ForEach-Object { (Get-FileHash $_ -Algorithm SHA256).Hash }
    $combined  = $hashes -join ","
    $hashBytes = [System.Security.Cryptography.SHA256]::Create().ComputeHash(
                     [System.Text.Encoding]::UTF8.GetBytes($combined))
    $hashStr   = ($hashBytes | ForEach-Object { $_.ToString("x2") }) -join ""
    Write-Host "Dependency files hash: $hashStr"
    Write-Host "##vso[task.setvariable variable=DEPS_FILES_HASH]$hashStr"
  displayName: Compute dependency cache key

- task: Cache@2
  displayName: Restore / save vcpkg dependency cache
  inputs:
    key: '"windows-vcpkg-x64-windows-static-md-v1" | "$(MSVC_TOOLSET)" | "$(DEPS_FILES_HASH)"'
    path: $(System.DefaultWorkingDirectory)/vcpkg_installed
    cacheHitVar: VCPKG_CACHE_RESTORED

- task: Cache@2
  displayName: Restore / save C++ build cache
  inputs:
    key: '"windows-deps-msvc-x64-windows-static-md-v1" | "$(MSVC_TOOLSET)" | "$(DEPS_FILES_HASH)"'
    path: $(System.DefaultWorkingDirectory)/cpp/build-msvc
    cacheHitVar: DEPS_CACHE_RESTORED

- pwsh: |
    & "$(System.DefaultWorkingDirectory)\.pipelines\pip-scripts\build-pip-wheels-windows-deps.ps1" `
        -SrcDir    "$(System.DefaultWorkingDirectory)" `
        -March     "${{ parameters.march }}" `
        -BuildType "${{ parameters.buildType }}" `
        -ClPath    "$(CL_PATH)"
  displayName: Build C++ dependencies (libint2 / gauxc / ecpint / blaspp / lapackpp)
  condition: or(ne(variables['DEPS_CACHE_RESTORED'], 'true'), ne(variables['VCPKG_CACHE_RESTORED'], 'true'))

# Pipeline for building and publishing Python wheels for QDK Chemistry
# Publishing can only be triggered manually after approval
# Non-publishing builds are triggered nightly on main to ensure the current builds are valid

trigger: none
pr: none

schedules:
- cron: 0 7 * * * # Time is in UTC; this runs at 11PM Pacific during standard time and 12AM Pacific during daylight time
  displayName: Nightly Build
  branches:
    include:
    - main
  always: true

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
  - repository: self
    path: qdk-chemistry

parameters:
- name: matrix
  type: object
  default:
  - name: linux_x86_64
    os: linux
    arch: x86_64
    march: x86-64-v3
    imageName: Ubuntu24.04Nightly
  - name: linux_aarch64
    os: linux
    arch: aarch64
    march: armv8-a
    imageName: 1es-pt-azurelinux3-arm
  - name: macos_arm64
    os: macOS
    arch: aarch64
    march: armv8-a
    imageName: ACES_VM_SharedPool_Tahoe
  - name: windows_x86_64
    os: windows
    arch: x86_64
    march: x86-64-v3
    imageName: windows-2025-1espt
  displayName: Target platforms
- name: pythonVersions
  type: stringList
  values:
  - 3.10
  - 3.11
  - 3.12
  - 3.13
  - 3.14
  default:
  - 3.10
  - 3.11
  - 3.12
  - 3.13
  - 3.14
  displayName: Python versions
- name: publishEsrp
  type: boolean
  default: false
  displayName: Publish to PyPI
- name: devTag
  type: string
  default: None
  displayName: PyPI Development Tag (e.g. 'dev1', 'rc1', etc.)
- name: runSlowTests
  type: boolean
  default: true
  displayName: Run slow tests

variables:
- group: QdkChemistry
- name: ComponentDetection.MaxDetectionThreads
  value: '16'
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    sdl:
      autobaseline:
        enableForGitHub: true
      componentgovernance:
        useAgentBuildDirectory: true
      codeql:
        compiled:
          enabled: true
        sourceLanguages: python
        binaryLanguages: cpp
      armory:
        enabled: false
        justificationForDisabling: ARM templates are not used in this repository.
        break: false
      eslint:
        enabled: false
        justificationForDisabling: JavaScript is not used in this repository.
        exitOnFatalError: true
      sourceAnalysisPool:
        name: Azure-Pipelines-DevTools-EO
        image: windows-2022
        os: windows
    stages:
    - stage: Build
      displayName: Build C++ Deps and Python Wheels
      jobs:
      # Windows C++ dependency build (vcpkg + FetchContent targets).
      # Runs once so the 5 parallel Python-version wheel jobs share a single
      # warm cache entry instead of each rebuilding deps independently.
      - job: Build_windows_x86_64_deps
        pool:
          name: $(CPU_POOL_X86)
          demands:
          - ImageOverride -equals windows-2025-1espt
          os: windows
        timeoutInMinutes: 480
        displayName: Build Windows x86_64 C++ dependencies
        steps:
        - template: .pipelines/templates/build-pip-wheels-windows-deps.yml@self
          parameters:
            march: x86-64-v3

      - ${{ each target in parameters.matrix }}:
        - job: Build_${{ target.name }}
          ${{ if eq(target.os, 'macOS') }}:
            pool:
              name: AcesShared
              demands:
              - ImageOverride -equals ${{ target.imageName }}
              os: ${{ target.os }}
              hostArchitecture: Arm64
          ${{ elseif eq(target.arch, 'aarch64') }}:
            pool:
              name: aqe-1es-Dpsd_v5-arm-pool
              demands:
              - ImageOverride -equals ${{ target.imageName }}
              os: ${{ target.os }}
              hostArchitecture: Arm64
          ${{ elseif eq(target.os, 'windows') }}:
            dependsOn: Build_windows_x86_64_deps
            pool:
              name: $(CPU_POOL_X86)
              demands:
              - ImageOverride -equals ${{ target.imageName }}
              os: windows
          ${{ else }}:
            pool:
              name: $(CPU_POOL_X86)
              demands:
              - ImageOverride -equals ${{ target.imageName }}
              os: ${{ target.os }}

          timeoutInMinutes: 480
          strategy:
            matrix:
              ${{ each py in parameters.pythonVersions }}:
                Py${{ py }}:
                  pythonVersion: ${{ py }}
            maxParallel: 5
          displayName: Build ${{ target.march }} ${{ target.os }} wheels
          variables:
            LD_LIBRARY_PATH: $LD_LIBRARY_PATH:/usr/local/lib
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: Upload Python $(pythonVersion) Wheels for ${{ target.os }} ${{ target.march }}
              targetPath: $(System.DefaultWorkingDirectory)/python/repaired_wheelhouse/
              artifactName: ${{ target.os }}-${{ target.arch }}-wheels-python$(pythonVersion)
          steps:
          - task: PipAuthenticate@1
            displayName: Pip Authenticate
            inputs:
              artifactFeeds: AzureQuantum/quantum-apps-dependencies
              onlyAddExtraIndex: false

          # Build - Linux x86_64
          - ${{ if and(eq(target.arch, 'x86_64'), eq(target.os, 'linux')) }}:
            - template: .pipelines/templates/build-pip-wheels.yml@self
              parameters:
                march: ${{ target.march }}
                buildTesting: OFF
                enableCoverage: OFF
                agentBuildDirectory: $(Agent.BuildDirectory)
                dockerImage: mcr.microsoft.com/mirror/docker/library/ubuntu:24.04
                imageTag: linux/amd64
                pythonVersion: $(pythonVersion)
                devTag: ${{ parameters.devTag }}

          # Test - Linux x86_64
          - ${{ if and(eq(target.arch, 'x86_64'), eq(target.os, 'linux')) }}:
            - template: .pipelines/templates/test-pip-wheels.yml@self
              parameters:
                agentBuildDirectory: $(Agent.BuildDirectory)
                dockerImage: mcr.microsoft.com/mirror/docker/library/ubuntu:24.04
                imageTag: linux/amd64
                pythonVersion: $(pythonVersion)
                runSlowTests: ${{ parameters.runSlowTests }}
                # Python 3.10 tests temporarily disabled (qre/cirq cannot resolve on 3.10);
                # the wheel is still built and published.
                condition: and(succeeded(), ne(variables['pythonVersion'], '3.10'))

          # Build - Linux ARM64
          - ${{ if and(eq(target.arch, 'aarch64'), eq(target.os, 'linux')) }}:
            - template: .pipelines/templates/build-pip-wheels.yml@self
              parameters:
                march: ${{ target.march }}
                buildTesting: OFF
                enableCoverage: OFF
                agentBuildDirectory: $(Agent.BuildDirectory)
                dockerImage: mcr.microsoft.com/mirror/docker/library/ubuntu:24.04
                imageTag: linux/arm64/v8
                pythonVersion: $(pythonVersion)
                devTag: ${{ parameters.devTag }}

          # Test - Linux ARM64
          - ${{ if and(eq(target.arch, 'aarch64'), eq(target.os, 'linux')) }}:
            - template: .pipelines/templates/test-pip-wheels.yml@self
              parameters:
                agentBuildDirectory: $(Agent.BuildDirectory)
                dockerImage: mcr.microsoft.com/mirror/docker/library/ubuntu:24.04
                imageTag: linux/arm64/v8
                pythonVersion: $(pythonVersion)
                runSlowTests: ${{ parameters.runSlowTests }}
                # Python 3.10 tests temporarily disabled (qre/cirq cannot resolve on 3.10);
                # the wheel is still built and published.
                condition: and(succeeded(), ne(variables['pythonVersion'], '3.10'))

          # Build - macOS ARM64
          - ${{ if eq(target.os, 'macOS') }}:
            - template: .pipelines/templates/build-pip-wheels.yml@self
              parameters:
                march: ${{ target.march }}
                buildTesting: OFF
                enableCoverage: OFF
                agentBuildDirectory: $(Agent.BuildDirectory)
                pythonVersion: $(pythonVersion)
                macBuild: ON
                devTag: ${{ parameters.devTag }}

          # Test - macOS ARM64
          - ${{ if eq(target.os, 'macOS') }}:
            - template: .pipelines/templates/test-pip-wheels.yml@self
              parameters:
                agentBuildDirectory: $(Agent.BuildDirectory)
                pythonVersion: $(pythonVersion)
                macBuild: ON
                runSlowTests: ${{ parameters.runSlowTests }}
                # Python 3.10 tests temporarily disabled (qre/cirq cannot resolve on 3.10);
                # the wheel is still built and published.
                condition: and(succeeded(), ne(variables['pythonVersion'], '3.10'))

          # Build - Windows x86_64
          - ${{ if eq(target.os, 'windows') }}:
            - template: .pipelines/templates/build-pip-wheels-windows.yml@self
              parameters:
                march: ${{ target.march }}
                buildTesting: OFF
                enableCoverage: OFF
                pythonVersion: $(pythonVersion)
                devTag: ${{ parameters.devTag }}

          # Test - Windows x86_64
          - ${{ if eq(target.os, 'windows') }}:
            - template: .pipelines/templates/test-pip-wheels-windows.yml@self
              parameters:
                pythonVersion: $(pythonVersion)
                runSlowTests: ${{ parameters.runSlowTests }}
                # Python 3.10 tests temporarily disabled (qre/cirq cannot resolve on 3.10);
                # the wheel is still built and published.
                condition: and(succeeded(), ne(variables['pythonVersion'], '3.10'))

          # SBoM Manifest Generator Task requires we transfer ownership of the wheel directory
          # back to the original base image user (Linux/macOS only; not needed on Windows).
          - ${{ if ne(target.os, 'windows') }}:
            - script: |
                sudo chown -R $(id -u):$(id -g) $(System.DefaultWorkingDirectory)/python/repaired_wheelhouse
                if [ -d "$(System.DefaultWorkingDirectory)/python/debug_symbols" ]; then
                  sudo chown -R $(id -u):$(id -g) $(System.DefaultWorkingDirectory)/python/debug_symbols
                fi
              displayName: Fix wheel directory ownership

          # Publishing debug symbols is not supported for macOS
          - ${{ if and( eq(target.os, 'linux'), eq(target.arch, 'x86_64') ) }}:
            - task: PublishSymbols@2
              displayName: Publish debug symbols
              condition: and(succeeded(), ${{ parameters.publishEsrp }})
              inputs:
                SymbolsFolder: $(System.DefaultWorkingDirectory)/python/debug_symbols
                IndexSources: false # Not applicable for non-Windows builds
                SymbolServerType: TeamServices
                SearchPattern: '**/*.debug'
                publishLinuxSymbols: true


    - stage: Approval
      displayName: Approval
      dependsOn: Build
      condition: and(succeeded(), eq(variables['Build.Reason'], 'Manual'), ${{ parameters.publishEsrp }})
      jobs:
      - job: Approval
        pool: server
        timeoutInMinutes: 1440     # job times out in 1 day
        steps:
        - task: ManualValidation@0
          timeoutInMinutes: 1440       # task times out in 1 day
          inputs:
            notifyUsers: ''
            instructions: Please verify artifacts and approve the release
            onTimeout: reject


    - stage: Release
      displayName: Release
      dependsOn: Approval
      condition: and(succeeded(), eq(variables['Build.Reason'], 'Manual'), ${{ parameters.publishEsrp }})
      jobs:
      - job: Publish_Python_Packages
        pool:
          name: Azure-Pipelines-DevTools-EO
          image: ubuntu-latest
          os: linux
        templateContext:
          type: releaseJob
          isProduction: true
          inputs:     # Declare all build artifacts to be consumed in the release job
          - input: pipelineArtifact
            artifactName: linux-x86_64-wheels-python3.10
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-x86_64-wheels-python3.10
          - input: pipelineArtifact
            artifactName: linux-x86_64-wheels-python3.11
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-x86_64-wheels-python3.11
          - input: pipelineArtifact
            artifactName: linux-x86_64-wheels-python3.12
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-x86_64-wheels-python3.12
          - input: pipelineArtifact
            artifactName: linux-x86_64-wheels-python3.13
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-x86_64-wheels-python3.13
          - input: pipelineArtifact
            artifactName: linux-x86_64-wheels-python3.14
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-x86_64-wheels-python3.14
          - input: pipelineArtifact
            artifactName: linux-aarch64-wheels-python3.10
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-aarch64-wheels-python3.10
          - input: pipelineArtifact
            artifactName: linux-aarch64-wheels-python3.11
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-aarch64-wheels-python3.11
          - input: pipelineArtifact
            artifactName: linux-aarch64-wheels-python3.12
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-aarch64-wheels-python3.12
          - input: pipelineArtifact
            artifactName: linux-aarch64-wheels-python3.13
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-aarch64-wheels-python3.13
          - input: pipelineArtifact
            artifactName: linux-aarch64-wheels-python3.14
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/linux-aarch64-wheels-python3.14
          - input: pipelineArtifact
            artifactName: macos-aarch64-wheels-python3.10
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/macos-aarch64-wheels-python3.10
          - input: pipelineArtifact
            artifactName: macos-aarch64-wheels-python3.11
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/macos-aarch64-wheels-python3.11
          - input: pipelineArtifact
            artifactName: macos-aarch64-wheels-python3.12
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/macos-aarch64-wheels-python3.12
          - input: pipelineArtifact
            artifactName: macos-aarch64-wheels-python3.13
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/macos-aarch64-wheels-python3.13
          - input: pipelineArtifact
            artifactName: macos-aarch64-wheels-python3.14
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/macos-aarch64-wheels-python3.14
          - input: pipelineArtifact
            artifactName: windows-x86_64-wheels-python3.10
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/windows-x86_64-wheels-python3.10
          - input: pipelineArtifact
            artifactName: windows-x86_64-wheels-python3.11
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/windows-x86_64-wheels-python3.11
          - input: pipelineArtifact
            artifactName: windows-x86_64-wheels-python3.12
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/windows-x86_64-wheels-python3.12
          - input: pipelineArtifact
            artifactName: windows-x86_64-wheels-python3.13
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/windows-x86_64-wheels-python3.13
          - input: pipelineArtifact
            artifactName: windows-x86_64-wheels-python3.14
            targetPath: $(System.DefaultWorkingDirectory)/artifacts/windows-x86_64-wheels-python3.14
        steps:
        - script: |
            mkdir -p $(System.DefaultWorkingDirectory)/target/wheels
            find $(System.DefaultWorkingDirectory)/artifacts -name "*.whl" -exec cp {} $(System.DefaultWorkingDirectory)/target/wheels/ \;
            ls $(System.DefaultWorkingDirectory)/target/wheels
          displayName: Collect Python Artifacts for Release

        # Setting the contenttype to the wrong value will allow us to do a dry run of this task without
        # publishing anything, according to the ESRP docs. When debugging, set contenttype: NPM to prevent publishing to PyPI.
        - task: EsrpRelease@12
          condition: succeeded()
          displayName: Publish Python Packages
          inputs:
            connectedservicename: PME ESRP Azure Connection
            usemanagedidentity: true
            keyvaultname: quantum-esrp-kv
            signcertname: ESRPCert
            clientid: 832c049d-cd07-4c1c-bfa5-c07250d190cb
            intent: PackageDistribution
            contenttype: PyPi
            contentsource: Folder
            folderlocation: $(System.DefaultWorkingDirectory)/target/wheels
            waitforreleasecompletion: true
            owners: davidwillia@microsoft.com, janunsleber@microsoft.com, nathanbaker@microsoft.com
            approvers: davidwillia@microsoft.com, janunsleber@microsoft.com, nathanbaker@microsoft.com
            serviceendpointurl: https://api.esrp.microsoft.com
            mainpublisher: ESRPRELPACMAN
            domaintenantid: 975f013f-7f24-47e8-a7d3-abc4752bf346

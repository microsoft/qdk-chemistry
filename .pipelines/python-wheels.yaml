# Pipeline for building and publishing Python wheels for QDK Chemistry
# Publishing can only be triggered manually after approval
# Non-publishing builds are triggered nightly on main to ensure the current builds are valid

trigger: none
pr: none

schedules:
- cron: 0 7 * * * # Time is in UTC; this runs at 11PM Pacific during standard time and 12AM Pacific during daylight time
  displayName: Nightly Build
  branches:
    include:
    - main
  always: true

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
  - repository: self
    path: qdk-chemistry
  containers:
  # Used for Linux container jobs so that CodeQL C++ tracing, the build, and CodeQL finalize
  # all share one environment (see codeql-docker docs). Both x86_64 and aarch64 reference this
  # resource; Docker selects the correct arch variant from the multi-arch manifest automatically.
  - container: linux_build_container
    image: mcr.microsoft.com/mirror/docker/library/ubuntu:24.04
    options: --user root

parameters:
- name: pythonVersions
  type: stringList
  values:
  - 3.10
  - 3.11
  - 3.12
  - 3.13
  - 3.14
  default:
  - 3.10
  - 3.11
  - 3.12
  - 3.13
  - 3.14
  displayName: Python versions
- name: publishInternalFeed
  type: boolean
  default: false
  displayName: Publish to Internal Feed
- name: publishEsrp
  type: boolean
  default: false
  displayName: Publish to PyPI
- name: devTag
  type: string
  default: None
  displayName: PyPI Development Tag (e.g. 'dev1', 'rc1', etc.)
- name: runSlowTests
  type: boolean
  default: true
  displayName: Run slow tests

variables:
- group: QdkChemistry
- name: ComponentDetection.MaxDetectionThreads
  value: '16'
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    sdl:
      autobaseline:
        enableForGitHub: true
      componentgovernance:
        useAgentBuildDirectory: true
      codeql:
        compiled:
          enabled: true
        sourceLanguages: python
        binaryLanguages: cpp
      psscriptanalyzer:
        enabled: false
        justificationForDisabling: Powershell is not used in this repository.
        break: false
      armory:
        enabled: false
        justificationForDisabling: ARM templates are not used in this repository.
        break: false
      eslint:
        enabled: false
        justificationForDisabling: JavaScript is not used in this repository.
        exitOnFatalError: true
      sourceAnalysisPool:
        name: Azure-Pipelines-DevTools-EO
        image: windows-2022
        os: windows
    stages:
    - stage: Build
      displayName: Build C++ Deps and Python Wheels
      jobs:
      - job: Build_x86_64
        pool:
          name: aqe-1es-HB120-pool
          demands:
          - ImageOverride -equals 1es-pt-azurelinux3
          os: linux
        timeoutInMinutes: 60
        strategy:
          matrix:
            ${{ each py in parameters.pythonVersions }}:
              Py${{ replace(py, '.', '_') }}:
                pythonVersion: ${{ py }}
          maxParallel: 5
        displayName: Build x86-64-v3 linux wheels
        variables:
          LD_LIBRARY_PATH: $LD_LIBRARY_PATH:/usr/local/lib
        templateContext:
          outputs:
          - output: pipelineArtifact
            displayName: Upload Python $(pythonVersion) Wheels for linux x86-64-v3
            targetPath: $(System.DefaultWorkingDirectory)/python/repaired_wheelhouse/
            artifactName: linux-x86_64-v3-wheels-python$(pythonVersion)
        steps:
        - script: |
            set -x

            whoami && id

            echo "== uname =="
            uname -a

            echo "== os-release =="
            cat /etc/os-release || true

            echo "== cgroup =="
            cat /proc/1/cgroup || true

            echo "== mountinfo =="
            grep -E 'overlay|container' /proc/1/mountinfo || true

            echo "== env =="
            env | grep -Ei 'container|docker|podman' || true

            echo "== pid1 =="
            ps -p 1 -o pid,comm,args=

            which apt-get || echo "no apt-get"
            which docker && docker ps || echo "no docker"

            pwd
            ls -la
            ls -la ..
          displayName: Diagnose environment (without target)

        - script: |
            set -x

            whoami && id

            echo "== uname =="
            uname -a

            echo "== os-release =="
            cat /etc/os-release || true

            echo "== cgroup =="
            cat /proc/1/cgroup || true

            echo "== mountinfo =="
            grep -E 'overlay|container' /proc/1/mountinfo || true

            echo "== env =="
            env | grep -Ei 'container|docker|podman' || true

            echo "== pid1 =="
            ps -p 1 -o pid,comm,args=

            which apt-get || echo "no apt-get"
            which docker && docker ps || echo "no docker"

            pwd
            ls -la
            ls -la ..
          displayName: Diagnose environment (with target)
          target: linux_build_container

        - task: PipAuthenticate@1
          displayName: Pip Authenticate
          inputs:
            artifactFeeds: AzureQuantum/quantum-apps-dependencies
            onlyAddExtraIndex: false

        # Install sudo in the build container so that subsequent container steps can use it.
        # 1ES PT enforces uid 1001 for all container steps regardless of `options: --user root`,
        # and ubuntu:24.04 does not ship sudo. This step runs on the host agent (no target:),
        # which has docker access, and installs sudo + configures the azure_pipelines_sudo group
        # (already created by ADO) for passwordless sudo before CodeQL Init runs.
        - script: |
            set -ex
            CID=$(docker ps --filter "ancestor=mcr.microsoft.com/mirror/docker/library/ubuntu:24.04" \
                  --format "{{.ID}}" | head -1)
            if [ -z "$CID" ]; then
              echo "ERROR: could not find running ubuntu:24.04 container" >&2
              docker ps
              exit 1
            fi
            echo "Installing sudo into container $CID..."
            docker exec --user root "$CID" bash -c "
              apt-get update -q &&
              apt-get install -y -q sudo &&
              echo '%azure_pipelines_sudo ALL=(ALL) NOPASSWD:ALL' \
                > /etc/sudoers.d/azure_pipelines_sudo &&
              chmod 0440 /etc/sudoers.d/azure_pipelines_sudo
            "
          displayName: Install sudo in build container

        # CodeQL Init - x86_64 Linux only. Init, build, and Finalize must all run in the
        # same environment for C++ tracing to work; using target: keeps them in the container.
        # - ${{ if eq(parameters.target.arch, 'x86_64') }}:
        - task: CodeQL3000Init@0
          target: linux_build_container
          displayName: CodeQL Initialize

        # Build - Linux x86_64
        - template: .pipelines/templates/build-pip-wheels.yml@self
          parameters:
            march: x86-64-v3
            buildTesting: OFF
            enableCoverage: OFF
            agentBuildDirectory: $(Agent.BuildDirectory)
            pythonVersion: $(pythonVersion)
            devTag: ${{ parameters.devTag }}
            containerName: linux_build_container

        # CodeQL Finalize - x86_64 Linux only (condition: always() so it runs even on build failure)
        # - ${{ if eq(target.arch, 'x86_64') }}:
        - task: CodeQL3000Finalize@0
          target: linux_build_container
          condition: always()
          displayName: CodeQL Finalize

        - template: .pipelines/templates/test-pip-wheels.yml@self
          parameters:
            agentBuildDirectory: $(Agent.BuildDirectory)
            pythonVersion: $(pythonVersion)
            runSlowTests: ${{ parameters.runSlowTests }}
            # ${{ if eq(target.os, 'macOS') }}:
              # macBuild: ON

          # SBoM Manifest Generator Task requires we transfer ownership of the wheel directory
          # back to the original base image user. For Linux container jobs we run as root
          # throughout, so no ownership transfer is needed (sudo is also not available in the
          # minimal ubuntu:24.04 image).
        # - ${{ if not(eq(parameters.target.os, 'linux')) }}:
        - script: |
            sudo chown -R $(id -u):$(id -g) $(System.DefaultWorkingDirectory)/python/repaired_wheelhouse
          displayName: Fix wheel directory ownership

        # - task: TwineAuthenticate@1
        #   inputs:
        #     artifactFeed: $(artifactProject)/$(artifactFeed)
        #   displayName: Authenticate to internal feed
        #   condition: and(succeeded(), ${{ parameters.publishInternalFeed }})

        # - script: |
        #     cd $(Agent.BuildDirectory)/qdk-chemistry/python
        #     python3 -m pip install twine
        #     python3 -m twine upload -r $(artifactFeed) repaired_wheelhouse/*.whl --config-file $(PYPIRC_PATH)
        #   displayName: Upload wheel with twine
        #   condition: and(succeeded(), ${{ parameters.publishInternalFeed }})

name: QDK bot

on:
  pull_request:
    branches:
    - copilot/configure-cicd-slow-tests
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  trigger-slow-tests:
    name: Trigger Slow Tests
    if: >
      github.event_name == 'pull_request' ||
      (
        github.event.issue.pull_request &&
        (
          contains(github.event.comment.body, '/qdkbot run slow tests') ||
          contains(github.event.comment.body, '/qdkbot run slow-tests') ||
          contains(github.event.comment.body, '/qdkbot run tests') ||
          contains(github.event.comment.body, '/qdkbot tests')
        ) &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    steps:
    - name: Get PR details
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          const headRepoFullName = pr.data.head.repo.full_name;
          const baseRepoFullName = pr.data.base.repo.full_name;
          if (headRepoFullName !== baseRepoFullName) {
            core.setFailed(`Cannot dispatch workflow for fork PRs (head repo: ${headRepoFullName}, base repo: ${baseRepoFullName}).`);
            return;
          }
          core.setOutput('ref', pr.data.head.ref);
          core.setOutput('sha', pr.data.head.sha);

    - name: Dispatch Build and Test workflow with slow tests
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'build-and-test.yaml',
            ref: '${{ steps.pr.outputs.ref }}',
            inputs: {
              run_slow_tests: 'true'
            }
          });

    - name: Acknowledge request
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: '🧪 Slow tests have been triggered on this PR. You can follow the progress in the [Actions tab](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions).'
          });

    - name: Notify dispatch failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: '❌ Failed to dispatch slow tests. Check the [workflow run](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.'
          });

name: Slow Tests (On Demand)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  actions: write
  statuses: write

jobs:
  trigger-slow-tests:
    name: Trigger Slow Tests
    if: >
      github.event.issue.pull_request && (
        contains(github.event.comment.body, '/qdk run slow tests') ||
        contains(github.event.comment.body, '/qdk run slow-tests') ||
        contains(github.event.comment.body, '/qdk run tests') ||
        contains(github.event.comment.body, '/qdk tests')
      )
    runs-on: ubuntu-latest
    steps:
    - name: Get PR head SHA
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          core.setOutput('ref', pr.data.head.ref);
          core.setOutput('sha', pr.data.head.sha);

    - name: Acknowledge request
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: '🧪 Slow tests have been triggered on this PR. You can follow the progress in the [Actions tab](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions).'
          });

    - name: Dispatch Build and Test workflow with slow tests
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'build-and-test.yaml',
            ref: '${{ steps.pr.outputs.ref }}',
            inputs: {
              run_slow_tests: 'true'
            }
          });

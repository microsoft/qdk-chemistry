name: Build and Test

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - '**'
  merge_group:
  workflow_dispatch:
    inputs:
      run_slow_tests:
        description: Run slow tests
        required: false
        default: false
        type: boolean
      rebuild_dep_cache:
        description: Rebuild dependency cache from scratch (ignore existing cache)
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  check-up-to-date:
    name: Check if branch is up to date with main
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Check if branch is up to date with main (Pull Request)
      run: |
        # Ensure origin/main is present
        git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main

        # Check if the current commit is ahead of main
        # Kills pipeline if branch is not up to date with main
        # For pull requests, we use github.event.pull_request.sha to get the commit SHA,
        # as GitHub treats the current commit as one that would be produced by merging into main
        if ! git merge-base --is-ancestor origin/main "${{ github.event.pull_request.head.sha }}"; then
          echo "This branch is not up to date with main. Please merge the latest changes from main into your branch to continue."
          exit 1
        fi

        echo "Branch is up to date, starting Build and Test workflow."

  coverage:
    name: ${{ matrix.os-name }} Build, Test, and Coverage Analysis
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        # Python 3.10 temporarily disabled: stable qdk[qre] requires cirq-core>=1.6.1,
        # which needs Python >= 3.11, so the qre extra cannot resolve on 3.10.
        - os-name: Linux
          runner: [self-hosted, 1ES.Pool=1es-gh-Dads_v5-pool-wus2, 1ES.ImageOverride=Ubuntu24.04Nightly, 'JobId=qdk_chemistry-linux-py3.13-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}']
          build-parallel: 32
          uarch: x86-64-v3
          python-version: '3.13'
          cpp-test-threads: 4
          python-test-threads: 4
        - os-name: Linux
          runner: [self-hosted, 1ES.Pool=1es-gh-Dads_v5-pool-wus2, 1ES.ImageOverride=Ubuntu24.04Nightly, 'JobId=qdk_chemistry-linux-py3.14-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}']
          build-parallel: 32
          uarch: x86-64-v3
          python-version: '3.14'
          cpp-test-threads: 4
          python-test-threads: 4
        - os-name: macOS
          runner: macos-26-xlarge
          build-parallel: 5
          uarch: native
          python-version: '3.13'
          cpp-test-threads: 4
          python-test-threads: 4
    env:
      BUILD_DIR: cpp/build
      QSHARP_PYTHON_TELEMETRY: 'false'
      CMAKE_INSTALL_PREFIX: ${{ github.workspace }}/install
      CPP_DEPS_PREFIX: ${{ github.workspace }}/cpp_deps_install
      CTEST_OUTPUT_ON_FAILURE: 1
      CMAKE_BUILD_PARALLEL_LEVEL: ${{ matrix.build-parallel }}
      QDK_UARCH: ${{ matrix.uarch }}
    steps:
    - name: Free up disk space (Linux)
      if: matrix.os-name == 'Linux'
      run: |
        echo "=== Disk space before cleanup ==="
        df -h

        # Remove unnecessary large packages commonly present on GitHub runners
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        sudo rm -rf /opt/hostedtoolcache/go || true
        sudo rm -rf /opt/hostedtoolcache/Ruby || true

        # Clean apt cache
        sudo apt-get clean || true

        echo "=== Disk space after cleanup ==="
        df -h

        echo "Workspace path: ${{ github.workspace }}"
        echo "Space available:"
        df -h "${{ github.workspace }}"

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up environment paths
      run: |
        echo "PATH=${{ github.workspace }}/install/bin:${{ github.workspace }}/install/lib:$PATH" >> $GITHUB_ENV
        echo "PYTHONPATH=${{ github.workspace }}/install/lib/python${{ matrix.python-version }}/site-packages:${{ github.workspace }}/install/lib:$PYTHONPATH" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=${{ github.workspace }}/install/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install Linux system packages
      if: matrix.os-name == 'Linux'
      run: |
        # Wait for any existing apt/dpkg processes to finish (e.g., unattended-upgrades)
        MAX_WAIT_SECONDS=300
        WAIT_INTERVAL_SECONDS=5
        ELAPSED_SECONDS=0
        while sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
          echo "Waiting for dpkg lock to be released (elapsed: ${ELAPSED_SECONDS}s, timeout: ${MAX_WAIT_SECONDS}s)..."
          # Log the process(es) currently holding the dpkg lock, if possible
          sudo fuser -v /var/lib/dpkg/lock-frontend || true
          sleep "${WAIT_INTERVAL_SECONDS}"
          ELAPSED_SECONDS=$((ELAPSED_SECONDS + WAIT_INTERVAL_SECONDS))
          if [ "${ELAPSED_SECONDS}" -ge "${MAX_WAIT_SECONDS}" ]; then
            echo "Error: dpkg lock was not released after ${MAX_WAIT_SECONDS} seconds. Failing step."
            exit 1
          fi
        done

        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ninja-build \
          cmake \
          libeigen3-dev \
          libboost-all-dev \
          libhdf5-dev \
          libopenblas-dev \
          libgfortran5 \
          pkg-config \
          doxygen \
          graphviz \
          gcovr

    - name: Install macOS system packages
      if: matrix.os-name == 'macOS'
      run: |
        brew update
        brew upgrade
        arch -arm64 brew install \
          cmake \
          ninja \
          eigen \
          boost \
          hdf5 \
          graphviz \
          gcovr \
          nlohmann-json \
          bison \
          flex \
          googletest

    - name: Cache Doxygen (macOS)
      if: matrix.os-name == 'macOS'
      id: cache-doxygen
      uses: actions/cache@v5
      with:
        path: |
          ${{ github.workspace }}/doxygen_install
        key: doxygen-${{ runner.os }}-Release_1_9_8

    - name: Build doxygen from source on macOS
      if: matrix.os-name == 'macOS' && steps.cache-doxygen.outputs.cache-hit != 'true'
      run: |
        # Clone repo for working Doxygen version
        git clone https://github.com/doxygen/doxygen.git
        cd doxygen

        # Checkout working release
        git checkout Release_1_9_8
        mkdir build && cd build

        cmake -DBISON_EXECUTABLE=/opt/homebrew/Cellar/bison/3.8.2/bin/bison \
        -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/doxygen_install" \
        -DCMAKE_CXX_FLAGS="-Wno-missing-template-arg-list-after-template-kw $CMAKE_CXX_FLAGS" \
        -G "Unix Makefiles" ..
        make -j$(sysctl -n hw.ncpu)
        make install

    - name: Add Doxygen to PATH (macOS)
      if: matrix.os-name == 'macOS'
      run: |
        echo "PATH=${{ github.workspace }}/doxygen_install/bin:$PATH" >> $GITHUB_ENV

    - name: Cache C++ dependency install # Checks if manifest files or build script have changed to rebuild dependencies
      id: cache-cpp-deps
      if: ${{ !inputs.rebuild_dep_cache }}
      uses: actions/cache/restore@v5
      with:
        path: |
          ${{ env.CPP_DEPS_PREFIX }}
        key: >-
          cpp-deps-${{ runner.os }}-${{ matrix.uarch }}-
          ${{ hashFiles('cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', '.devcontainer/scripts/install_cpp_dependencies.sh') }}

    - name: Add C++ deps prefix to CMake search path
      run: |
        echo "CMAKE_PREFIX_PATH=${{ env.CPP_DEPS_PREFIX }}:${CMAKE_PREFIX_PATH}" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=${{ env.CPP_DEPS_PREFIX }}/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
        echo "PATH=${{ env.CPP_DEPS_PREFIX }}/bin:${PATH}" >> $GITHUB_ENV

    - name: Install C++ dependencies
      if: steps.cache-cpp-deps.outputs.cache-hit != 'true' # Run the dependency build if we don't find the right hash in the cache
      env:
        INSTALL_PREFIX: ${{ env.CPP_DEPS_PREFIX }}
        BUILD_DIR: ${{ github.workspace }}/cpp_deps_build
        KEEP_BUILD_DIR: 1
      run: |
        bash ${{ github.workspace }}/.devcontainer/scripts/install_cpp_dependencies.sh \
          ${{ github.workspace }}/cpp/manifest/qdk-chemistry/cgmanifest.json \
          ${{ github.workspace }}/external/macis/manifest/cgmanifest.json

    - name: Save C++ dependency cache
      if: steps.cache-cpp-deps.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{ env.CPP_DEPS_PREFIX }}
        key: >-
          cpp-deps-${{ runner.os }}-${{ matrix.uarch }}-
          ${{ hashFiles('cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', '.devcontainer/scripts/install_cpp_dependencies.sh') }}

    - name: Configure C++ RelWithDebInfo/Coverage build
      run: |
        if [ "${{ matrix.os-name }}" == "macOS" ]; then
          TOOLCHAIN_FILE="${{ github.workspace }}/.pipelines/toolchains/macos.cmake"
        else
          TOOLCHAIN_FILE="${{ github.workspace }}/.pipelines/toolchains/linux.cmake"
        fi
        cmake -S cpp -B "$BUILD_DIR" \
          -GNinja \
          -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_INSTALL_PREFIX="$CMAKE_INSTALL_PREFIX" \
          -DQDK_UARCH="$QDK_UARCH" \
          -DQDK_ENABLE_OPENMP=${{ matrix.os-name == 'Linux' && 'ON' || 'OFF' }} \
          -DQDK_CHEMISTRY_ENABLE_COVERAGE=ON \
          -DBUILD_TESTING=ON \
          -DMACIS_ENABLE_TESTS=ON

    - name: Build C++ RelWithDebInfo/Coverage library
      run: cmake --build "$BUILD_DIR"

    - name: Run C++ tests in RelWithDebInfo/Coverage mode with coverage
      env:
        OMP_NUM_THREADS: ${{ matrix.cpp-test-threads }}
      run: |
        mkdir -p test-results ${{ github.workspace }}/coverage-reports
        cd "$BUILD_DIR"

        echo "=== Running C++ Tests in Debug Mode with Coverage ==="
        set +e
        if [ "$QDK_UARCH" == "native" ]; then # Exclude particular test on macOS builds
          ctest --output-on-failure --verbose --timeout 300 --output-junit ${{ github.workspace }}/test-results/ctest_results.xml -E "MACIS_SERIAL_TEST|AtomInitGuessEnergyConvergence"
        else
          ctest --output-on-failure --verbose --timeout 300 --output-junit ${{ github.workspace }}/test-results/ctest_results.xml -E "MACIS_SERIAL_TEST"
        fi

        CTEST_EXIT_CODE=$?
        set -e

        if [ $CTEST_EXIT_CODE -ne 0 ]; then
          echo "=== Some tests failed ==="
          echo "Exit code: $CTEST_EXIT_CODE"
        fi

        cd ${{ github.workspace }}

        gcovr --root ${{ github.workspace }}/cpp \
          --object-directory "${{ github.workspace }}/${BUILD_DIR}" \
          --filter '${{ github.workspace }}/cpp/src/.*' \
          --filter '${{ github.workspace }}/cpp/include/.*' \
          --exclude '.*/tests/.*' \
          --exclude '.*test.*\.cpp' \
          --exclude '.*gtest.*' \
          --exclude '.*gmock.*' \
          --exclude '.*/external/.*' \
          --html-details ${{ github.workspace }}/coverage-reports/cpp_coverage.html \
          --xml ${{ github.workspace }}/coverage-reports/cpp_coverage.xml \
          --txt ${{ github.workspace }}/coverage-reports/cpp_coverage.txt \
          --merge-mode-functions=separate \
          --gcov-ignore-parse-errors

        echo "C++ Coverage Summary:"
        cat ${{ github.workspace }}/coverage-reports/cpp_coverage.txt

        if [ $CTEST_EXIT_CODE -ne 0 ]; then
          exit $CTEST_EXIT_CODE
        fi

    - name: Install C++ library
      run: |
        cmake --install "$BUILD_DIR" --prefix "$CMAKE_INSTALL_PREFIX"

    - name: Test C++ installation
      run: |
        cmake -S examples/language/cpp -B build_example -GNinja -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install
        cmake --build build_example --target all
        echo "C++ Example Compiled with Pre-Installed QDK/Chemistry-C++ Libraries!"

    - name: Install Python package
      working-directory: python
      env:
        QDK_CHEMISTRY_ENABLE_COVERAGE: 1
        CMAKE_BUILD_TYPE: RelWithDebInfo
      run: |
        # Remove CMake files to build Python package without picking the installed library
        rm -r ${{ github.workspace }}/install/lib/cmake/qdk

        # Install Python dependencies and build package
        # Use persistent build directory for coverage analysis
        if [ "${{ matrix.python-version }}" = "3.13" ]; then
          python -m pip install --prefix=${{ github.workspace }}/install -C build-dir="build/{wheel_tag}" .[test,docs]
        else
          python -m pip install --prefix=${{ github.workspace }}/install -C build-dir="build/{wheel_tag}" .[test]
        fi

        # Print installed packages for debugging
        echo "------------------ Installed Python packages ------------------"
        python -m pip freeze
        echo "---------------------------------------------------------------"

        # Test import
        python -c "import qdk_chemistry; print('qdk_chemistry version:', qdk_chemistry.__version__)"

        # Register the Jupyter kernel for notebook tests
        python -m ipykernel install --user --name python3 --display-name "Python 3"

    - name: Run Python tests
      env:
        OMP_NUM_THREADS: ${{ matrix.python-test-threads }}
        QDK_CHEMISTRY_RUN_SLOW_TESTS: ${{ ((github.event_name == 'workflow_dispatch' && inputs.run_slow_tests) || github.event_name == 'merge_group') && '1' || '0' }}
      working-directory: python
      run: |
        set -e
        mkdir -p ../test-results ../coverage-reports

        BUILD_TEMP=$(find . -type d -path './build/cp*' -print -quit)
        echo "Found build directory: $BUILD_TEMP"

        set +e
        set -o pipefail
        pytest \
          --cov=qdk_chemistry \
          --cov-report=xml:../coverage-reports/python_coverage.xml \
          --cov-report=html:../coverage-reports/python_coverage_html \
          --cov-report=term \
          --junitxml=../test-results/pytest_report.xml \
          -v \
          --tb=short \
          2>&1 | tee ../coverage-reports/python_coverage.txt

        PYTEST_EXIT_CODE=${PIPESTATUS[0]}
        set -e

        echo "=== Python Test Output ==="
        cat ../coverage-reports/python_coverage.txt

        if [ $PYTEST_EXIT_CODE -ne 0 ]; then
          echo "ERROR: Python tests failed with exit code $PYTEST_EXIT_CODE"
        fi

        if [ -n "$BUILD_TEMP" ] && [ -d "$BUILD_TEMP" ]; then
          find "$BUILD_TEMP" -name "*.gcda" -exec cp {} coverage_build/ \; 2>/dev/null || true
        fi

        if [ $PYTEST_EXIT_CODE -ne 0 ]; then
          exit 1
        fi

    - name: Generate Pybind11 coverage report
      working-directory: python
      run: |
        PYBIND_BUILD_DIR=$(find . -wholename "./build/cp*/CMakeFiles/_core.dir" | head -1)
        CLEAN_BUILD_DIR="${PYBIND_BUILD_DIR#./}"

        gcovr \
          --root ${{ github.workspace }}/python \
          --object-directory "${{ github.workspace }}/python/$CLEAN_BUILD_DIR" \
          --filter '.*src/pybind11.*' \
          --filter '.*src/cpp.*' \
          --exclude '.*test.*' \
          --exclude '.*external.*' \
          --gcov-ignore-errors=no_working_dir_found \
          --gcov-ignore-errors=source_not_found \
          --xml "../coverage-reports/pybind11_coverage.xml" \
          --txt "../coverage-reports/pybind11_coverage.txt" \
          --html-details "../coverage-reports/pybind11_coverage.html"

        echo "Pybind11 Coverage Summary:"
        cat ../coverage-reports/pybind11_coverage.txt

    - name: Generate coverage statistics
      run: |
        # Extract coverage percentages
        CPP_COVERAGE=$(grep -oP 'TOTAL.*?\K[0-9.]+(?=%)' coverage-reports/cpp_coverage.txt | tail -1 || echo "0")
        PYTHON_COVERAGE=$(grep -oP 'TOTAL.*?\K[0-9]+(?=%)' coverage-reports/python_coverage.txt | tail -1 || echo "0")
        PYBIND11_COVERAGE=$(grep -oP 'TOTAL.*?\K[0-9.]+(?=%)' coverage-reports/pybind11_coverage.txt | tail -1 || echo "0")

        echo "CPP_COVERAGE=$CPP_COVERAGE" >> $GITHUB_ENV
        echo "PYTHON_COVERAGE=$PYTHON_COVERAGE" >> $GITHUB_ENV
        echo "PYBIND11_COVERAGE=$PYBIND11_COVERAGE" >> $GITHUB_ENV

        # Create simple PR comment with just statistics
        echo "## 📊 Coverage Summary" > pr-comment.md
        echo "" >> pr-comment.md
        echo "| Component | Coverage |" >> pr-comment.md
        echo "|-----------|----------|" >> pr-comment.md
        echo "| C++ Library | ${CPP_COVERAGE}% |" >> pr-comment.md
        echo "| Python Package | ${PYTHON_COVERAGE}% |" >> pr-comment.md
        if [ "$PYBIND11_COVERAGE" != "0" ]; then
          echo "| Pybind11 Bindings | ${PYBIND11_COVERAGE}% |" >> pr-comment.md
        fi
        echo "" >> pr-comment.md
        echo "---" >> pr-comment.md
        echo "" >> pr-comment.md

        echo "### Detailed Coverage Reports" >> pr-comment.md
        echo "" >> pr-comment.md
        echo "<details>" >> pr-comment.md
        echo "<summary>C++ Coverage Details</summary>" >> pr-comment.md
        echo "" >> pr-comment.md
        echo '```' >> pr-comment.md
        cat coverage-reports/cpp_coverage.txt >> pr-comment.md
        echo '```' >> pr-comment.md
        echo "</details>" >> pr-comment.md
        echo "" >> pr-comment.md

        if [ -f coverage-reports/python_coverage.txt ]; then
          echo "<details>" >> pr-comment.md
          echo "<summary>Python Coverage Details</summary>" >> pr-comment.md
          echo "" >> pr-comment.md
          echo '```' >> pr-comment.md
          tail -50 coverage-reports/python_coverage.txt >> pr-comment.md
          echo '```' >> pr-comment.md
          echo "</details>" >> pr-comment.md
          echo "" >> pr-comment.md
        fi

        if [ -f coverage-reports/pybind11_coverage.txt ]; then
          echo "<details>" >> pr-comment.md
          echo "<summary>Pybind11 Coverage Details</summary>" >> pr-comment.md
          echo "" >> pr-comment.md
          echo '```' >> pr-comment.md
          cat coverage-reports/pybind11_coverage.txt >> pr-comment.md
          echo '```' >> pr-comment.md
          echo "</details>" >> pr-comment.md
        fi

    - name: Add coverage to job summary
      run: |
        # Create comprehensive summary with table and detailed reports
        echo "## 📊 Coverage Summary" > coverage-summary.md
        echo "" >> coverage-summary.md
        echo "| Component | Coverage |" >> coverage-summary.md
        echo "|-----------|----------|" >> coverage-summary.md
        echo "| C++ Library | ${CPP_COVERAGE}% |" >> coverage-summary.md
        echo "| Python Package | ${PYTHON_COVERAGE}% |" >> coverage-summary.md
        if [ "$PYBIND11_COVERAGE" != "0" ]; then
          echo "| Pybind11 Bindings | ${PYBIND11_COVERAGE}% |" >> coverage-summary.md
        fi
        echo "" >> coverage-summary.md
        echo "---" >> coverage-summary.md
        echo "" >> coverage-summary.md

        echo "### Detailed Coverage Reports" >> coverage-summary.md
        echo "" >> coverage-summary.md
        echo "<details>" >> coverage-summary.md
        echo "<summary>C++ Coverage Details</summary>" >> coverage-summary.md
        echo "" >> coverage-summary.md
        echo '```' >> coverage-summary.md
        cat coverage-reports/cpp_coverage.txt >> coverage-summary.md
        echo '```' >> coverage-summary.md
        echo "</details>" >> coverage-summary.md
        echo "" >> coverage-summary.md

        if [ -f coverage-reports/python_coverage.txt ]; then
          echo "<details>" >> coverage-summary.md
          echo "<summary>Python Coverage Details</summary>" >> coverage-summary.md
          echo "" >> coverage-summary.md
          echo '```' >> coverage-summary.md
          tail -50 coverage-reports/python_coverage.txt >> coverage-summary.md
          echo '```' >> coverage-summary.md
          echo "</details>" >> coverage-summary.md
          echo "" >> coverage-summary.md
        fi

        if [ -f coverage-reports/pybind11_coverage.txt ]; then
          echo "<details>" >> coverage-summary.md
          echo "<summary>Pybind11 Coverage Details</summary>" >> coverage-summary.md
          echo "" >> coverage-summary.md
          echo '```' >> coverage-summary.md
          cat coverage-reports/pybind11_coverage.txt >> coverage-summary.md
          echo '```' >> coverage-summary.md
          echo "</details>" >> coverage-summary.md
        fi

        # Add to job summary
        cat coverage-summary.md >> $GITHUB_STEP_SUMMARY

    - name: Build documentation
      if: matrix.python-version == '3.13'
      working-directory: docs
      run: |
        set +e
        make clean all
        MAKE_EXIT_CODE=$?
        set -e

        if [ $MAKE_EXIT_CODE -ne 0 ]; then
          echo "=== Documentation build failed ==="
          echo "=== Contents of all .txt output files ==="
          for txtfile in *-output.txt *-warnings.txt; do
            if [ -f "$txtfile" ]; then
              echo ""
              echo "==== File: $txtfile ===="
              cat "$txtfile"
            fi
          done
          exit $MAKE_EXIT_CODE
        fi

  coverage-windows:
    name: ${{ matrix.compiler }} - Build & test (Windows)
    runs-on: [self-hosted, 1ES.Pool=1es-gh-Dads_v5-pool-wus2, 1ES.ImageOverride=windows-2025-1espt, 'JobId=qdk_chemistry-win-${{ strategy.job-index }}-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}']
    timeout-minutes: 480
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        compiler: [msvc, clang-cl]
    env:
      VCPKG_TRIPLET: x64-windows-static-md
      QDK_UARCH: x86-64-v3
      # Bump to force a rebuild of the cached dependencies.
      DEPS_CACHE_VERSION: v1
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up ${{ matrix.compiler }} environment
      id: env
      uses: ./.github/actions/windows-msvc-env
      with:
        compiler: ${{ matrix.compiler }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Set memory-aware build parallelism
      shell: pwsh
      id: env2
      run: |
        # qdk TUs that include libint2 engine.impl.h peak at several GB under MSVC;
        # cap concurrency by available RAM (~4 GB/job) to avoid C1060 (compiler out
        # of heap space). Scales up automatically on a larger runner.
        $cpu = [int]$env:NUMBER_OF_PROCESSORS
        $ramGB = [math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1GB)
        $jobs = [math]::Min($cpu, [math]::Max(1, [math]::Round($ramGB / 4)))
        Write-Host "CPUs=$cpu RAM=${ramGB}GB -> CMAKE_BUILD_PARALLEL_LEVEL=$jobs"
        "CMAKE_BUILD_PARALLEL_LEVEL=$jobs" >> $env:GITHUB_ENV
        # Include a short hash of the workspace path in the cache key so that
        # runners with different workspace base directories (e.g. D:\a\ vs
        # D:\a\_work\) each get their own cache entry and never hit a
        # CMakeCache.txt path mismatch on restore.
        $wsPath = "${{ github.workspace }}".ToLower().Replace('\', '/')
        $wsBytes = [System.Text.Encoding]::UTF8.GetBytes($wsPath)
        $wsHash = ([System.Security.Cryptography.SHA256]::Create().ComputeHash($wsBytes) |
                    ForEach-Object { $_.ToString('x2') }) -join ''
        "wshash=$($wsHash.Substring(0, 12))" >> $env:GITHUB_OUTPUT

    - name: Restore dependency cache
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: |
          vcpkg_installed
          cpp/build-${{ matrix.compiler }}
        key: >-
          windows-deps-${{ matrix.compiler }}-${{ env.VCPKG_TRIPLET }}-vs${{ steps.env.outputs.toolset }}-${{ env.DEPS_CACHE_VERSION }}-ws${{ steps.env2.outputs.wshash }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**', 'cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', 'cpp/cmake/third_party.cmake', 'cpp/cmake/patches/**', 'cpp/cmake/modules/DependencyManager.cmake', 'external/macis/src/lobpcgxx/CMakeLists.txt', '.pipelines/toolchains/windows.cmake') }}

    - name: Validate cached build directory
      id: cache-validate
      if: steps.cache.outputs.cache-hit == 'true'
      shell: pwsh
      run: |
        # If the cached CMakeCache.txt was written on a runner with a different
        # workspace base path (e.g. D:\a\ vs D:\a\_work\) the cached build.ninja
        # files will reference stale absolute paths and cmake/ninja will fail.
        # Detect this by checking whether the current workspace path appears in
        # CMakeCache.txt (case-insensitive, forward-slash-normalised) and, if not,
        # wipe the build directory so the configure + build steps run from scratch.
        $buildDir = "cpp/build-${{ matrix.compiler }}"
        $cacheFile = "$buildDir/CMakeCache.txt"
        if (-not (Test-Path $cacheFile)) {
          Write-Host "No CMakeCache.txt in restored cache — treating as cache miss"
          "cache-valid=false" >> $env:GITHUB_OUTPUT
          exit 0
        }
        $ws = "${{ github.workspace }}".Replace('\', '/').ToLower()
        $content = (Get-Content $cacheFile -Raw).ToLower().Replace('\', '/')
        if ($content -notmatch [regex]::Escape($ws)) {
          Write-Host "Workspace path mismatch in cached CMakeCache.txt (expected: $ws)"
          Remove-Item -Recurse -Force $buildDir -ErrorAction SilentlyContinue
          "cache-valid=false" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "Cached build directory paths match current workspace"
          "cache-valid=true" >> $env:GITHUB_OUTPUT
        }

    - name: Install vcpkg dependencies
      if: steps.cache.outputs.cache-hit != 'true' || steps.cache-validate.outputs.cache-valid == 'false'
      shell: pwsh
      run: |
        $vcpkg = $env:VCPKG_INSTALLATION_ROOT
        if (-not $vcpkg) { $vcpkg = 'C:\vcpkg' }
        & "$vcpkg\vcpkg.exe" install `
          --triplet ${{ env.VCPKG_TRIPLET }} `
          --x-manifest-root="${{ github.workspace }}" `
          --x-install-root="${{ github.workspace }}\vcpkg_installed" `
          --overlay-ports="${{ github.workspace }}\vcpkg-overlay\ports"
        if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed ($LASTEXITCODE)" }

    - name: Configure CMake
      if: steps.cache.outputs.cache-hit != 'true' || steps.cache-validate.outputs.cache-valid == 'false'
      shell: pwsh
      run: |
        $vcpkg = $env:VCPKG_INSTALLATION_ROOT
        if (-not $vcpkg) { $vcpkg = 'C:\vcpkg' }
        cmake -S cpp -B "cpp/build-${{ matrix.compiler }}" -GNinja `
          -DQDK_UARCH=${{ env.QDK_UARCH }} `
          -DQDK_CHEMISTRY_ENABLE_COVERAGE=OFF `
          -DQDK_CHEMISTRY_ENABLE_MPI=OFF `
          -DMACIS_ENABLE_TESTS=OFF `
          -DBUILD_SHARED_LIBS=OFF `
          -DBUILD_TESTING=ON `
          -DCMAKE_GTEST_DISCOVER_TESTS_DISCOVERY_MODE=PRE_TEST `
          -DVCPKG_APPLOCAL_DEPS=OFF `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_C_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          -DCMAKE_CXX_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\install-${{ matrix.compiler }}" `
          -DCMAKE_TOOLCHAIN_FILE="$vcpkg\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="${{ github.workspace }}\.pipelines\toolchains\windows.cmake" `
          -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }} `
          -DVCPKG_INSTALLED_DIR="${{ github.workspace }}\vcpkg_installed" `
          -DFETCHCONTENT_QUIET=OFF
        if ($LASTEXITCODE -ne 0) { throw "CMake configure failed ($LASTEXITCODE)" }

    - name: Build C++ dependencies
      if: steps.cache.outputs.cache-hit != 'true' || steps.cache-validate.outputs.cache-valid == 'false'
      shell: pwsh
      run: |
        # libint2_cxx is a CMake INTERFACE target (no Ninja phony); libint2_obj is
        # the actual OBJECT library that compiles all libint2 sources.
        cmake --build "cpp/build-${{ matrix.compiler }}" --target libint2_obj ecpint gauxc blaspp lapackpp
        if ($LASTEXITCODE -ne 0) { throw "Dependency build failed ($LASTEXITCODE)" }

    - name: Save dependency cache
      if: steps.cache.outputs.cache-hit != 'true' || steps.cache-validate.outputs.cache-valid == 'false'
      uses: actions/cache/save@v5
      with:
        path: |
          vcpkg_installed
          cpp/build-${{ matrix.compiler }}
        key: >-
          windows-deps-${{ matrix.compiler }}-${{ env.VCPKG_TRIPLET }}-vs${{ steps.env.outputs.toolset }}-${{ env.DEPS_CACHE_VERSION }}-ws${{ steps.env2.outputs.wshash }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**', 'cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', 'cpp/cmake/third_party.cmake', 'cpp/cmake/patches/**', 'cpp/cmake/modules/DependencyManager.cmake', 'external/macis/src/lobpcgxx/CMakeLists.txt', '.pipelines/toolchains/windows.cmake') }}

    - name: Build C++ library
      shell: pwsh
      run: |
        # Dep targets are already up-to-date (either just built or restored from
        # cache); Ninja skips them and only compiles qdk + test sources.
        # Honors CMAKE_BUILD_PARALLEL_LEVEL set above (memory-aware).
        cmake --build "cpp/build-${{ matrix.compiler }}"
        if ($LASTEXITCODE -ne 0) { throw "CMake build failed ($LASTEXITCODE)" }

    - name: Run C++ tests
      shell: pwsh
      env:
        OMP_NUM_THREADS: '2'
      run: |
        Push-Location "cpp/build-${{ matrix.compiler }}"
        # Exclude MACIS_SERIAL_TEST (as on Linux) and libint2's own unit tests:
        # libint2/unit/build is a compile-at-test-time meta-test of the vendored
        # libint2 dependency that exceeds the ctest timeout under MSVC. qdk's own
        # tests still run.
        ctest --output-on-failure --verbose --timeout 400 `
          --output-junit ctest_results.xml `
          -E "MACIS_SERIAL_TEST|libint2/unit"
        $code = $LASTEXITCODE
        Pop-Location
        if ($code -ne 0) { throw "ctest failed ($code)" }

    - name: Install C++ library
      shell: pwsh
      run: |
        cmake --install "cpp/build-${{ matrix.compiler }}"
        if ($LASTEXITCODE -ne 0) { throw "CMake install failed ($LASTEXITCODE)" }

    - name: Build & install Python package
      shell: pwsh
      run: |
        $vcpkg = $env:VCPKG_INSTALLATION_ROOT
        if (-not $vcpkg) { $vcpkg = 'C:\vcpkg' }
        $prefix = "${{ github.workspace }}\vcpkg_installed\${{ env.VCPKG_TRIPLET }};${{ github.workspace }}\install-${{ matrix.compiler }}"
        Push-Location python
        # plugins (pyscf) do not build on Windows; install the test extra only.
        # QDK_ALLOW_DEPENDENCY_FETCH=OFF: fail fast if the installed qdk is not
        # reused (avoids a silent multi-hour rebuild of the C++ stack from source).
        python -m pip install -v ".[test]" `
          --config-settings=cmake.args="-GNinja" `
          --config-settings=cmake.define.CMAKE_PREFIX_PATH="$prefix" `
          --config-settings=cmake.define.QDK_ALLOW_DEPENDENCY_FETCH=OFF `
          --config-settings=cmake.define.CMAKE_C_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          --config-settings=cmake.define.CMAKE_CXX_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          --config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE="$vcpkg\scripts\buildsystems\vcpkg.cmake" `
          --config-settings=cmake.define.VCPKG_CHAINLOAD_TOOLCHAIN_FILE="${{ github.workspace }}\.pipelines\toolchains\windows.cmake" `
          --config-settings=cmake.define.VCPKG_TARGET_TRIPLET="${{ env.VCPKG_TRIPLET }}" `
          --config-settings=cmake.define.VCPKG_INSTALLED_DIR="${{ github.workspace }}\vcpkg_installed"
        if ($LASTEXITCODE -ne 0) { Pop-Location; throw "Python package install failed ($LASTEXITCODE)" }
        python -c "import qdk_chemistry; print('qdk_chemistry version:', qdk_chemistry.__version__)"
        if ($LASTEXITCODE -ne 0) { Pop-Location; throw "Python import check failed ($LASTEXITCODE)" }
        Pop-Location

    - name: Run Python tests
      shell: pwsh
      env:
        OMP_NUM_THREADS: '2'
        QDK_CHEMISTRY_RUN_SLOW_TESTS: ${{ ((github.event_name == 'workflow_dispatch' && inputs.run_slow_tests) || github.event_name == 'merge_group') && '1' || '0' }}
      run: |
        Push-Location python
        pytest -v --tb=short
        $code = $LASTEXITCODE
        Pop-Location
        if ($code -ne 0) { throw "pytest failed ($code)" }

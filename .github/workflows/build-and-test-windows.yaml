name: Build and Test (Windows)

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - '**'
  merge_group:
  workflow_dispatch:
    inputs:
      run_slow_tests:
        description: Run slow tests
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VCPKG_TRIPLET: x64-windows-static-md
  QDK_UARCH: x86-64-v3
  # Bump to force a rebuild of the cached dependencies.
  DEPS_CACHE_VERSION: v1

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: build and cache the (slow) external C++ dependencies.
  #
  # Builds ONLY the slow FetchContent dependency targets
  # (libint2/gauxc/ecpint/blaspp/lapackpp). With MSVC this can take several
  # hours, so the build is RESUMABLE: the build dir is cached after every run
  # (complete -> stable key; partial -> per-run key), and the next run restores
  # the furthest progress and lets Ninja continue. Once a complete cache exists
  # the build is skipped entirely. The job timeout is 12 hours.
  # ----------------------------------------------------------------------------
  deps:
    name: ${{ matrix.compiler }} - Dependencies
    runs-on: [self-hosted, 1ES.Pool=1es-gh-Dads_v5-pool-wus2, 1ES.ImageOverride=windows-2025-1espt, 'JobId=qdk_chemistry-win-deps-${{ strategy.job-index }}-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}']
    timeout-minutes: 720
    permissions:
      contents: read
      actions: write  # prune stale dependency caches
    strategy:
      fail-fast: false
      matrix:
        compiler: [msvc, clang-cl]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up ${{ matrix.compiler }} environment
      id: env
      uses: ./.github/actions/windows-msvc-env
      with:
        compiler: ${{ matrix.compiler }}

    - name: Restore dependency cache
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: |
          vcpkg_installed
          cpp/build-${{ matrix.compiler }}
        # Exact key = a completed build. restore-keys prefix = the furthest
        # partial build from a previous (timed-out) run, for resuming.
        key: >-
          windows-deps-${{ matrix.compiler }}-${{ env.VCPKG_TRIPLET }}-vs${{ steps.env.outputs.toolset }}-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**', 'cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', 'cpp/cmake/third_party.cmake', 'cpp/cmake/patches/**', 'cpp/cmake/modules/DependencyManager.cmake', 'external/macis/src/lobpcgxx/CMakeLists.txt', '.pipelines/toolchains/windows.cmake') }}
        restore-keys: |
          windows-deps-${{ matrix.compiler }}-${{ env.VCPKG_TRIPLET }}-vs${{ steps.env.outputs.toolset }}-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**', 'cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', 'cpp/cmake/third_party.cmake', 'cpp/cmake/patches/**', 'cpp/cmake/modules/DependencyManager.cmake', 'external/macis/src/lobpcgxx/CMakeLists.txt', '.pipelines/toolchains/windows.cmake') }}-partial-

    - name: Install vcpkg dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        if (Test-Path "vcpkg_installed/${{ env.VCPKG_TRIPLET }}/lib") {
          Write-Host "vcpkg dependencies already present (restored from cache); skipping install."
          exit 0
        }
        $vcpkg = $env:VCPKG_INSTALLATION_ROOT
        if (-not $vcpkg) { $vcpkg = 'C:\vcpkg' }
        & "$vcpkg\vcpkg.exe" install `
          --triplet ${{ env.VCPKG_TRIPLET }} `
          --x-manifest-root="${{ github.workspace }}" `
          --x-install-root="${{ github.workspace }}\vcpkg_installed" `
          --overlay-ports="${{ github.workspace }}\vcpkg-overlay\ports"
        if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed ($LASTEXITCODE)" }

    - name: Configure CMake
      if: steps.cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $vcpkg = $env:VCPKG_INSTALLATION_ROOT
        if (-not $vcpkg) { $vcpkg = 'C:\vcpkg' }
        cmake -S cpp -B "cpp/build-${{ matrix.compiler }}" -GNinja `
          -DQDK_UARCH=${{ env.QDK_UARCH }} `
          -DQDK_CHEMISTRY_ENABLE_COVERAGE=OFF `
          -DQDK_CHEMISTRY_ENABLE_MPI=OFF `
          -DMACIS_ENABLE_TESTS=ON `
          -DBUILD_SHARED_LIBS=OFF `
          -DBUILD_TESTING=ON `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_C_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          -DCMAKE_CXX_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\install-${{ matrix.compiler }}" `
          -DCMAKE_TOOLCHAIN_FILE="$vcpkg\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="${{ github.workspace }}\.pipelines\toolchains\windows.cmake" `
          -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }} `
          -DVCPKG_INSTALLED_DIR="${{ github.workspace }}\vcpkg_installed" `
          -DFETCHCONTENT_QUIET=OFF
        if ($LASTEXITCODE -ne 0) { throw "CMake configure failed ($LASTEXITCODE)" }

    - name: Build dependency targets (resumable, time-boxed)
      id: build
      if: steps.cache.outputs.cache-hit != 'true'
      # Kept under the 12h job cap (accounting for vcpkg + download overhead) so
      # the resumable partial cache is saved before the job is force-cancelled.
      # The next run restores this progress and continues.
      timeout-minutes: 630
      shell: pwsh
      run: |
        # Alias targets (Libint2::cxx, ECPINT::ecpint, gauxc::gauxc) are CMake-level
        # constructs and don't get Ninja phony targets; use the internal library names.
        cmake --build "cpp/build-${{ matrix.compiler }}" --target libint2_cxx ecpint gauxc blaspp lapackpp
        if ($LASTEXITCODE -ne 0) { throw "Dependency build failed ($LASTEXITCODE)" }

    - name: Save dependency cache (complete)
      if: ${{ always() && steps.build.outcome == 'success' }}
      uses: actions/cache/save@v5
      with:
        path: |
          vcpkg_installed
          cpp/build-${{ matrix.compiler }}
        key: >-
          windows-deps-${{ matrix.compiler }}-${{ env.VCPKG_TRIPLET }}-vs${{ steps.env.outputs.toolset }}-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**', 'cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', 'cpp/cmake/third_party.cmake', 'cpp/cmake/patches/**', 'cpp/cmake/modules/DependencyManager.cmake', 'external/macis/src/lobpcgxx/CMakeLists.txt', '.pipelines/toolchains/windows.cmake') }}

    - name: Save dependency cache (partial, for resume)
      if: ${{ always() && (steps.build.outcome == 'failure' || steps.build.outcome == 'cancelled') }}
      uses: actions/cache/save@v5
      with:
        path: |
          vcpkg_installed
          cpp/build-${{ matrix.compiler }}
        key: >-
          windows-deps-${{ matrix.compiler }}-${{ env.VCPKG_TRIPLET }}-vs${{ steps.env.outputs.toolset }}-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**', 'cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', 'cpp/cmake/third_party.cmake', 'cpp/cmake/patches/**', 'cpp/cmake/modules/DependencyManager.cmake', 'external/macis/src/lobpcgxx/CMakeLists.txt', '.pipelines/toolchains/windows.cmake') }}-partial-${{ github.run_id }}-${{ github.run_attempt }}

    - name: Prune stale dependency caches
      if: always()
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Best-effort: keep the newest partial (for resume) and drop older ones;
        # once a complete build succeeds, drop all partials for this base key.
        $base = "windows-deps-${{ matrix.compiler }}-${{ env.VCPKG_TRIPLET }}-vs${{ steps.env.outputs.toolset }}-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**', 'cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', 'cpp/cmake/third_party.cmake', 'cpp/cmake/patches/**', 'cpp/cmake/modules/DependencyManager.cmake', 'external/macis/src/lobpcgxx/CMakeLists.txt', '.pipelines/toolchains/windows.cmake') }}-"
        $keepNewestPartial = @('failure','cancelled') -contains '${{ steps.build.outcome }}'
        try {
          $caches = gh cache list --limit 100 --json id,key,createdAt | ConvertFrom-Json
          $partials = $caches |
            Where-Object { $_.key.StartsWith($base) -and $_.key.Contains('-partial-') } |
            Sort-Object createdAt -Descending
          $skip = if ($keepNewestPartial) { 1 } else { 0 }
          $partials | Select-Object -Skip $skip | ForEach-Object {
            Write-Host "Deleting stale cache: $($_.key)"
            gh cache delete $_.id 2>$null
          }
        } catch {
          Write-Host "Cache prune skipped: $_"
        }

  # ----------------------------------------------------------------------------
  # Job 2: rebuild qdk against the cached dependencies, then run the C++ and
  # Python test suites. qdk/macis/test sources are re-checked-out here, so this
  # job always rebuilds them; the cached dependency .libs are reused as-is.
  # ----------------------------------------------------------------------------
  build-test:
    name: ${{ matrix.compiler }} - Build & test
    runs-on: [self-hosted, 1ES.Pool=1es-gh-Dads_v5-pool-wus2, 1ES.ImageOverride=windows-2025-1espt, 'JobId=qdk_chemistry-win-build-${{ strategy.job-index }}-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}']
    timeout-minutes: 360
    needs: deps
    strategy:
      fail-fast: false
      matrix:
        compiler: [msvc, clang-cl]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up ${{ matrix.compiler }} environment
      id: env
      uses: ./.github/actions/windows-msvc-env
      with:
        compiler: ${{ matrix.compiler }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Set memory-aware build parallelism
      shell: pwsh
      run: |
        # qdk TUs that include libint2 engine.impl.h peak at several GB under MSVC;
        # cap concurrency by available RAM (~4 GB/job) to avoid C1060 (compiler out
        # of heap space). Scales up automatically on a larger runner.
        $cpu = [int]$env:NUMBER_OF_PROCESSORS
        $ramGB = [math]::Floor((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1GB)
        $jobs = [math]::Min($cpu, [math]::Max(1, [math]::Floor($ramGB / 4)))
        Write-Host "CPUs=$cpu RAM=${ramGB}GB -> CMAKE_BUILD_PARALLEL_LEVEL=$jobs"
        "CMAKE_BUILD_PARALLEL_LEVEL=$jobs" >> $env:GITHUB_ENV

    - name: Restore dependency cache
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: |
          vcpkg_installed
          cpp/build-${{ matrix.compiler }}
        key: >-
          windows-deps-${{ matrix.compiler }}-${{ env.VCPKG_TRIPLET }}-vs${{ steps.env.outputs.toolset }}-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay/**', 'cpp/manifest/qdk-chemistry/cgmanifest.json', 'external/macis/manifest/cgmanifest.json', 'cpp/cmake/third_party.cmake', 'cpp/cmake/patches/**', 'cpp/cmake/modules/DependencyManager.cmake', 'external/macis/src/lobpcgxx/CMakeLists.txt', '.pipelines/toolchains/windows.cmake') }}

    - name: Configure & build C++ library
      shell: pwsh
      run: |
        $vcpkg = $env:VCPKG_INSTALLATION_ROOT
        if (-not $vcpkg) { $vcpkg = 'C:\vcpkg' }
        cmake -S cpp -B "cpp/build-${{ matrix.compiler }}" -GNinja `
          -DQDK_UARCH=${{ env.QDK_UARCH }} `
          -DQDK_CHEMISTRY_ENABLE_COVERAGE=OFF `
          -DQDK_CHEMISTRY_ENABLE_MPI=OFF `
          -DMACIS_ENABLE_TESTS=OFF `
          -DBUILD_SHARED_LIBS=OFF `
          -DBUILD_TESTING=ON `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_C_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          -DCMAKE_CXX_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\install-${{ matrix.compiler }}" `
          -DCMAKE_TOOLCHAIN_FILE="$vcpkg\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="${{ github.workspace }}\.pipelines\toolchains\windows.cmake" `
          -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }} `
          -DVCPKG_INSTALLED_DIR="${{ github.workspace }}\vcpkg_installed" `
          -DFETCHCONTENT_QUIET=OFF
        if ($LASTEXITCODE -ne 0) { throw "CMake configure failed ($LASTEXITCODE)" }
        # Honors CMAKE_BUILD_PARALLEL_LEVEL set above (memory-aware).
        cmake --build "cpp/build-${{ matrix.compiler }}"
        if ($LASTEXITCODE -ne 0) { throw "CMake build failed ($LASTEXITCODE)" }

    - name: Run C++ tests
      shell: pwsh
      env:
        OMP_NUM_THREADS: '2'
      run: |
        Push-Location "cpp/build-${{ matrix.compiler }}"
        # Exclude MACIS_SERIAL_TEST (as on Linux) and libint2's own unit tests:
        # libint2/unit/build is a compile-at-test-time meta-test of the vendored
        # libint2 dependency that exceeds the ctest timeout under MSVC. qdk's own
        # tests still run.
        ctest --output-on-failure --verbose --timeout 400 `
          --output-junit ctest_results.xml `
          -E "MACIS_SERIAL_TEST|libint2/unit"
        $code = $LASTEXITCODE
        Pop-Location
        if ($code -ne 0) { throw "ctest failed ($code)" }

    - name: Install C++ library
      shell: pwsh
      run: |
        cmake --install "cpp/build-${{ matrix.compiler }}"
        if ($LASTEXITCODE -ne 0) { throw "CMake install failed ($LASTEXITCODE)" }

    - name: Build & install Python package
      shell: pwsh
      run: |
        $vcpkg = $env:VCPKG_INSTALLATION_ROOT
        if (-not $vcpkg) { $vcpkg = 'C:\vcpkg' }
        $prefix = "${{ github.workspace }}\vcpkg_installed\${{ env.VCPKG_TRIPLET }};${{ github.workspace }}\install-${{ matrix.compiler }}"
        Push-Location python
        # plugins (pyscf) do not build on Windows; install the test extra only.
        # QDK_ALLOW_DEPENDENCY_FETCH=OFF: fail fast if the installed qdk is not
        # reused (avoids a silent multi-hour rebuild of the C++ stack from source).
        python -m pip install -v ".[test]" `
          --config-settings=cmake.args="-GNinja" `
          --config-settings=cmake.define.CMAKE_PREFIX_PATH="$prefix" `
          --config-settings=cmake.define.QDK_ALLOW_DEPENDENCY_FETCH=OFF `
          --config-settings=cmake.define.CMAKE_C_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          --config-settings=cmake.define.CMAKE_CXX_COMPILER="${{ steps.env.outputs.cxx-path }}" `
          --config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE="$vcpkg\scripts\buildsystems\vcpkg.cmake" `
          --config-settings=cmake.define.VCPKG_CHAINLOAD_TOOLCHAIN_FILE="${{ github.workspace }}\.pipelines\toolchains\windows.cmake" `
          --config-settings=cmake.define.VCPKG_TARGET_TRIPLET="${{ env.VCPKG_TRIPLET }}" `
          --config-settings=cmake.define.VCPKG_INSTALLED_DIR="${{ github.workspace }}\vcpkg_installed"
        if ($LASTEXITCODE -ne 0) { Pop-Location; throw "Python package install failed ($LASTEXITCODE)" }
        python -c "import qdk_chemistry; print('qdk_chemistry version:', qdk_chemistry.__version__)"
        if ($LASTEXITCODE -ne 0) { Pop-Location; throw "Python import check failed ($LASTEXITCODE)" }
        Pop-Location

    - name: Run Python tests
      shell: pwsh
      env:
        OMP_NUM_THREADS: '2'
        QDK_CHEMISTRY_RUN_SLOW_TESTS: ${{ inputs.run_slow_tests && '1' || '0' }}
      run: |
        Push-Location python
        pytest -v --tb=short
        $code = $LASTEXITCODE
        Pop-Location
        if ($code -ne 0) { throw "pytest failed ($code)" }
